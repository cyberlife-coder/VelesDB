# Default permissions for tauri-plugin-velesdb
#
# This file defines the default permission set that applications
# can use to enable VelesDB functionality.
#
# IMPORTANT: This list MUST be kept in sync with:
# - `src/lib.rs` invoke_handler registration
# - `build.rs` COMMANDS array
# The sync is enforced by the permission tests in `src/commands_tests.rs`,
# which parse the `lib.rs` registration, the COMMANDS array, and this file.

[default]
description = "Default permissions for VelesDB plugin - allows all database operations"
permissions = [
    # Collection management
    "allow-create-collection",
    "allow-create-metadata-collection",
    "allow-delete-collection",
    "allow-list-collections",
    "allow-get-collection",
    "allow-is-empty",
    "allow-flush",
    "allow-compact-storage",
    "allow-update-guardrails",
    "allow-get-guardrails",
    "allow-scroll-collection",
    # Point operations
    "allow-upsert",
    "allow-upsert-metadata",
    "allow-get-points",
    "allow-delete-points",
    # Search operations
    "allow-search",
    "allow-search-ids",
    "allow-batch-search",
    "allow-text-search",
    "allow-hybrid-search",
    "allow-multi-query-search",
    "allow-query",
    # Sparse vector operations
    "allow-sparse-search",
    "allow-hybrid-sparse-search",
    "allow-sparse-upsert",
    # PQ training
    "allow-train-pq",
    # Streaming insert
    "allow-stream-insert",
    "allow-enable-streaming",
    # AgentMemory (semantic, episodic, procedural)
    "allow-semantic-store",
    "allow-semantic-store-with-ttl",
    "allow-semantic-query",
    "allow-semantic-delete",
    "allow-semantic-dimension",
    "allow-semantic-serialize",
    "allow-semantic-deserialize",
    "allow-episodic-record",
    "allow-episodic-recent",
    "allow-episodic-recall-similar",
    "allow-episodic-older-than",
    "allow-episodic-delete",
    "allow-episodic-serialize",
    "allow-episodic-deserialize",
    "allow-procedural-learn",
    "allow-procedural-recall",
    "allow-procedural-reinforce",
    "allow-procedural-list-all",
    "allow-procedural-delete",
    "allow-procedural-serialize",
    "allow-procedural-deserialize",
    # AgentMemory TTL / eviction / snapshot-versioning / VelesQL parity
    "allow-memory-set-ttl",
    "allow-memory-auto-expire",
    "allow-memory-evict-low-confidence",
    "allow-memory-snapshot",
    "allow-memory-load-latest-snapshot",
    "allow-memory-load-snapshot-version",
    "allow-memory-list-snapshot-versions",
    "allow-memory-query-semantic",
    "allow-memory-query-episodic",
    "allow-memory-query-procedural",
    # Knowledge Graph
    "allow-create-graph-collection",
    "allow-add-edge",
    "allow-add-edges-batch",
    "allow-get-edges",
    "allow-traverse-graph",
    "allow-get-node-degree",
    "allow-traverse-graph-parallel",
    # Secondary Indexes
    "allow-create-index",
    "allow-drop-index",
    "allow-list-indexes",
]

# Read-only permission set
[read-only]
description = "Read-only permissions - search and list operations only"
permissions = [
    "allow-list-collections",
    "allow-get-collection",
    "allow-is-empty",
    "allow-get-points",
    "allow-scroll-collection",
    "allow-search",
    "allow-search-ids",
    "allow-batch-search",
    "allow-text-search",
    "allow-hybrid-search",
    "allow-multi-query-search",
    "allow-query",
    "allow-semantic-query",
    "allow-episodic-recent",
    "allow-procedural-recall",
    "allow-get-edges",
    "allow-traverse-graph",
    "allow-get-node-degree",
    "allow-traverse-graph-parallel",
    "allow-list-indexes",
    "allow-sparse-search",
    "allow-hybrid-sparse-search",
    "allow-get-guardrails",
]

# Search-only permission set
[search-only]
description = "Search-only permissions - no collection management"
permissions = [
    "allow-search",
    "allow-search-ids",
    "allow-text-search",
    "allow-hybrid-search",
]
