<svg viewBox="0 0 980 360" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="Benchmark protocol: one realistic coding session is sent to the model two ways, without VelesDB everything is re-sent every message, with VelesDB the context is compiled first; both arms are measured on billed tokens and graded answer quality">
  <!-- Hand-authored, like the other diagrams in this directory (compile-flow.svg,
       data-paths.svg, tri-engine.svg). No generated numbers in this one — the
       measured figures live in benchmark-gains.svg / benchmark-headroom.svg,
       regenerated by examples/real-session-benchmark/make_gains_svg.mjs. -->
  <defs>
    <marker id="bp-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="360" fill="#ffffff"/>

  <text x="490" y="30" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">One real coding session, sent two ways — then compared</text>

  <!-- The session -->
  <rect x="24" y="120" width="180" height="120" rx="10" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="114" y="148" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1e1b4b">A coding session</text>
  <text x="114" y="168" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#312e81">14&#8211;36 messages that pile up:</text>
  <text x="114" y="185" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#312e81">screenshots &#8226; CI logs</text>
  <text x="114" y="202" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#312e81">docs read again &#8226; files</text>
  <text x="114" y="219" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#312e81">re-opened after edits</text>

  <!-- split arrows -->
  <line x1="204" y1="150" x2="262" y2="105" stroke="#334155" stroke-width="2" marker-end="url(#bp-arrow)"/>
  <line x1="204" y1="210" x2="262" y2="255" stroke="#334155" stroke-width="2" marker-end="url(#bp-arrow)"/>

  <!-- Arm A: without -->
  <rect x="266" y="58" width="270" height="94" rx="10" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="401" y="84" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#334155">without VelesDB</text>
  <text x="401" y="104" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#475569">everything it has ever seen is</text>
  <text x="401" y="120" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#475569">re-sent on every single message</text>
  <text x="401" y="139" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">(what a naive agent harness does today)</text>

  <!-- Arm B: with -->
  <rect x="266" y="208" width="270" height="94" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <text x="401" y="234" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#14532d">with VelesDB</text>
  <text x="401" y="254" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#166534">compile_context first: duplicates dropped,</text>
  <text x="401" y="270" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#166534">outdated screenshots retired, repeated</text>
  <text x="401" y="286" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#166534">log lines collapsed &#8212; same information</text>

  <!-- arrows to model -->
  <line x1="536" y1="105" x2="596" y2="150" stroke="#334155" stroke-width="2" marker-end="url(#bp-arrow)"/>
  <line x1="536" y1="255" x2="596" y2="210" stroke="#334155" stroke-width="2" marker-end="url(#bp-arrow)"/>

  <!-- The model -->
  <rect x="600" y="130" width="160" height="100" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="680" y="160" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#78350f">the model</text>
  <text x="680" y="180" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#92400e">Claude API, or the</text>
  <text x="680" y="196" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#92400e">Claude Code CLI</text>
  <text x="680" y="212" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#a16207">(billed mode &#8212; zero config)</text>

  <line x1="760" y1="180" x2="812" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#bp-arrow)"/>

  <!-- The measurement -->
  <rect x="816" y="118" width="144" height="124" rx="10" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="888" y="144" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1e1b4b">measured, per arm</text>
  <text x="888" y="166" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#312e81">&#8226; tokens billed</text>
  <text x="888" y="182" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#4338ca">(the provider's own usage count)</text>
  <text x="888" y="203" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#312e81">&#8226; answer quality</text>
  <text x="888" y="219" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#4338ca">(graded fact checklist)</text>

  <text x="490" y="342" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#64748b">offline mode needs no key and no network: same counting (a real tokenizer + the API's image formula), deterministic, reproduced twice &#8212; examples/real-session-benchmark</text>
</svg>
