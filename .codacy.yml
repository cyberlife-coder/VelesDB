---
# =============================================================================
# VelesDB — Codacy Repository Configuration
# =============================================================================
#
# This file configures Codacy static analysis exclusions to eliminate
# known false positives while preserving all legitimate quality checks.
#
# Policy: Every exclusion must have a documented rationale.
# Review this file when adding new modules that use unsafe code.
#
# Maintainer: Julien L.
# Last reviewed: 2026-03-16
# =============================================================================

# ---------------------------------------------------------------------------
# Global exclusions — files excluded from ALL Codacy tools
# ---------------------------------------------------------------------------
exclude_paths:
  # --- Non-production code (different quality standards) ---
  # Test files follow different rules: assert is idiomatic, complexity
  # limits don't apply to test harnesses, unsafe is used for test fixtures.
  # Test quality is enforced by `cargo test`, not static analysis.
  - "crates/**/src/**/*_tests.rs"
  - "crates/**/src/**/*_test.rs"
  - "crates/**/src/**/tests.rs"
  - "crates/**/tests/**"
  # Benchmark harnesses (criterion) — perf code, not production
  - "crates/**/benches/**"
  # Generated code (pest parser, build scripts)
  - "crates/**/build.rs"
  # Conformance test data (JSON fixtures, not source code)
  - "conformance/**"
  # Demo/example apps (illustrative, not production)
  - "demos/**"
  # Documentation assets (markdown, diagrams)
  - "docs/**"
  # CI/tooling scripts (validated by shellcheck separately)
  - "scripts/**"
  # SDK test suites
  - "sdks/**/tests/**"
  - "sdks/**/__tests__/**"
  # Integration test suites (Python) — assert is idiomatic in pytest,
  # /tmp usage is for test fixtures, builtin shadowing is non-issue in tests
  - "integrations/**/tests/**"
  # Example applications (illustrative, not production) — random usage,
  # LangChain imports, complexity are all acceptable in demo code
  - "examples/**"
  # Changelog files — Keep-a-Changelog format requires repeated headings
  # (### Added, ### Fixed, etc.) per version section
  - "CHANGELOG.md"
  - "crates/**/CHANGELOG.md"
  # CLI README (repeated section headings are normal for long docs)
  - "crates/velesdb-cli/README.md"
  # TypeScript SDK REST/streaming backends — fetch URL constructed from
  # trusted application config (baseUrl), not user input. SSRF is FP.
  - "sdks/typescript/src/backends/**"
  # Integration contains_text_search helpers — Codacy's online taint analysis
  # flags VelesQL query construction as SQL injection. All user inputs are
  # sanitized BEFORE the query is built:
  #   - collection: validate_collection_name() → [a-zA-Z0-9_-]+ only
  #   - column:     validate_column_name()     → [a-zA-Z0-9_.]+ only
  #   - keyword:    keyword.replace("'","''")   → SQL-style quote escaping
  # The static analyser cannot follow sanitization across Python call boundaries,
  # producing persistent false positives despite repeated per-engine exclusions.
  - "integrations/langchain/src/langchain_velesdb/search_ops.py"
  - "integrations/llamaindex/src/llamaindex_velesdb/search_ops.py"
  # Root-level benchmark scripts (Python, not criterion)
  - "benchmarks/**"
  # Non-project directories (dependencies, tooling, build output)
  - ".venv/**"
  - ".claude/**"
  - "node_modules/**"
  - "target/**"
  - ".tmp/**"
  # Local environment files (gitignored, never committed). Trivy scans the
  # local filesystem including gitignored files, flagging dev-only tokens.
  # Codacy Cloud only sees tracked files so this is a local-CLI-only concern.
  - "**/.env"
  - "**/.env.*"
  - "**/.env.local"

  # --- Audited unsafe code (false positive suppression) ---
  # Codacy's "unsafe detected" rule cannot distinguish documented from
  # undocumented unsafe. VelesDB enforces // SAFETY: comments on ALL
  # unsafe blocks via:
  #   1. CI script: scripts/verify_unsafe_safety_template.py
  #   2. Full audit: docs/SOUNDNESS.md (reviewed per release)
  #
  # These files MUST use unsafe for architectural reasons:

  # SIMD intrinsics — _mm256_*, _mm512_*, vld1q_f32, vfmaq_f32
  # Cannot be called without unsafe in Rust. Every block documents
  # alignment, bounds, and ISA preconditions.
  - "crates/velesdb-core/src/simd_native/**"
  # HNSW graph hot paths — get_unchecked for bounds-check elimination
  # in inner search loops (greedy descent, neighbor scanning).
  # Invariants: node IDs come from the graph's own insert path.
  - "crates/velesdb-core/src/index/hnsw/native/graph/**"
  # Aligned memory allocation — ContiguousVectors, AllocGuard
  # RAII-guarded alloc/dealloc with panic safety.
  - "crates/velesdb-core/src/perf_optimizations.rs"
  # Memory-mapped I/O — platform-specific mmap operations
  # mmap.rs uses MmapMut::map_mut (requires unsafe). compaction.rs uses
  # libc::fallocate and MmapMut for zero-copy compaction. guard.rs wraps
  # raw pointers for aligned vector access (RAII guarded).
  - "crates/velesdb-core/src/storage/mmap.rs"
  - "crates/velesdb-core/src/storage/compaction.rs"
  - "crates/velesdb-core/src/storage/guard.rs"
  # HNSW index core — get_unchecked in search loops, aligned vector access
  # Invariants documented in docs/SOUNDNESS.md. Covered by Miri CI.
  - "crates/velesdb-core/src/index/hnsw/index/mod.rs"
  - "crates/velesdb-core/src/index/hnsw/index/vacuum.rs"
  - "crates/velesdb-core/src/index/hnsw/vector_store.rs"
  # SIMD NEON intrinsics (ARM equivalent of AVX2)
  - "crates/velesdb-core/src/simd_neon.rs"
  - "crates/velesdb-core/src/simd_neon_prefetch.rs"
  # Allocation guard — RAII-guarded aligned alloc/dealloc
  - "crates/velesdb-core/src/alloc_guard.rs"
  # SIMD trigram — AVX2/NEON distance in trigram index
  - "crates/velesdb-core/src/index/trigram/simd.rs"
  # Vector byte conversion — raw pointer cast for zero-copy serialization
  - "crates/velesdb-core/src/storage/vector_bytes.rs"
  # Internal benchmark helper (not production)
  - "crates/velesdb-core/src/internal_bench.rs"
  # FFI bindings — PyO3 (Python), JNI (mobile), wasm-bindgen
  - "crates/velesdb-python/**"
  - "crates/velesdb-mobile/**"
  - "crates/velesdb-wasm/**"
  # Contiguous vector operations — dealloc + ptr::copy_nonoverlapping for
  # cache-locality reordering. Every block has // SAFETY: comments documenting
  # layout, bounds, and non-overlapping invariants.
  - "crates/velesdb-core/src/contiguous_ops.rs"
  # mmap capacity growth — MmapMut::map_mut after file resize (file was set_len'd
  # to new_len before remapping, ensuring bounds are valid).
  - "crates/velesdb-core/src/storage/mmap_capacity.rs"
  # Contiguous resize — dealloc/realloc path extracted from contiguous_ops.rs
  # to comply with the 500-NLOC per-file budget. Every unsafe block carries
  # the same // SAFETY: documentation (layout alignment, ownership,
  # non-overlapping invariants) as the pre-extraction version. Covered by
  # Miri CI.
  - "crates/velesdb-core/src/contiguous_resize.rs"

# ---------------------------------------------------------------------------
# Per-engine exclusions — targeted suppression without losing other checks
# ---------------------------------------------------------------------------
engines:
  # NOTE: Codacy uses Lizard for complexity/NLOC analysis.
  # "metrics" was incorrect — Lizard is the actual engine name.
  lizard:
    # Idiomatic Rust patterns with legitimate complexity above threshold.
    # These files are still analyzed by all OTHER Codacy tools (security,
    # duplication, style) — only complexity/NLOC metrics are excluded.
    exclude_paths:
      # --- WHERE evaluation (enum pattern matching) ---
      - "crates/velesdb-core/src/collection/search/query/match_exec/where_eval.rs"

      # --- Const fn / enum→string lookup tables ---
      # Flat match expressions mapping enum variants to strings.
      # Each arm is 1–3 lines; splitting scatters the lookup table.
      - "crates/velesdb-core/src/simd_dispatch.rs"
      - "crates/velesdb-core/src/distance.rs"
      - "crates/velesdb-core/src/metrics/guardrails.rs"
      - "crates/velesdb-core/src/metrics/query.rs"
      - "crates/velesdb-core/src/metrics/operational.rs"
      - "crates/velesdb-core/src/velesql/ast/with_clause.rs"
      - "crates/velesdb-core/src/index/trigram/simd.rs"
      - "crates/velesdb-core/src/index/trigram/gpu.rs"
      - "crates/velesdb-core/src/collection/search/query/score_fusion/mod.rs"
      - "crates/velesdb-core/src/collection/search/query/score_fusion/boost.rs"
      - "crates/velesdb-core/src/filter/conversion.rs"
      - "crates/velesdb-core/src/velesql/json_path.rs"
      - "crates/velesdb-core/src/velesql/parser/conditions.rs"
      - "crates/velesdb-core/src/agent/reinforcement.rs"

      # --- CLI dispatch loops and parsers ---
      # REPL main loop is a single giant match (CC=136), import parsers
      # handle many CSV/JSONL edge cases. Cannot be split without
      # fragmenting the user-facing command table.
      - "crates/velesdb-cli/src/main.rs"
      - "crates/velesdb-cli/src/import.rs"
      - "crates/velesdb-cli/src/repl_commands.rs"

      # --- Migration pipeline (multi-source orchestration) ---
      # Pipeline.run() orchestrates Qdrant/Pinecone/Elasticsearch
      # sources with retries, pagination, and progress tracking.
      - "crates/velesdb-migrate/src/pipeline.rs"
      - "crates/velesdb-migrate/src/retry.rs"

      # --- MATCH executor (Lizard false positive: merges adjacent fns) ---
      # accept_traversal_hit is 30 NLOC / CC=3 but Lizard reports "70 lines"
      # by merging it with the preceding execute_for_start_nodes function.
      - "crates/velesdb-core/src/collection/search/query/match_exec/mod.rs"

      # --- Query execution internals (parameter-heavy dispatch) ---
      # These functions pass through many query context fields; wrapping
      # in a struct would add indirection without clarity gain.
      - "crates/velesdb-core/src/collection/search/query/execution_paths.rs"
      - "crates/velesdb-core/src/collection/search/query/join.rs"

      # --- CLI / REPL (interactive tool, not production engine) ---
      - "crates/velesdb-cli/src/**"

      # --- Examples, benchmarks, fuzz targets ---
      - "crates/velesdb-core/examples/**"
      - "benchmarks/**"
      - "fuzz/**"

      # --- Generated files ---
      - "sdks/typescript/package-lock.json"

      # --- Integration test files ---
      - "crates/velesdb-core/src/column_store_tests.rs"

      # --- Migration wizard (one-shot CLI tool, not engine) ---
      - "crates/velesdb-migrate/src/**"

      # --- Tauri plugin (thin FFI bridge, not engine) ---
      - "crates/tauri-plugin-velesdb/src/**"

      # --- GPU backend (sequential hardware init pipeline) ---
      - "crates/velesdb-core/src/gpu/**"

      # --- Point deserialization (serde custom impl) ---
      - "crates/velesdb-core/src/point.rs"

      # --- Async streaming (tokio pipeline) ---
      - "crates/velesdb-core/src/collection/streaming/ingester.rs"

      # --- Graph traversal (BFS/DFS algorithms) ---
      - "crates/velesdb-core/src/collection/graph/traversal.rs"
      - "crates/velesdb-core/src/collection/graph/edge_concurrent/mod.rs"

      # --- Storage mmap (includes vector_io sub-module) ---
      - "crates/velesdb-core/src/storage/mmap/**"
      - "crates/velesdb-core/src/storage/mmap.rs"

      # --- HNSW native (search loops with inherent complexity) ---
      - "crates/velesdb-core/src/index/hnsw/native/dual_precision.rs"
      # --- HNSW beam search hot path (lock-held greedy descent + prefetch) ---
      - "crates/velesdb-core/src/index/hnsw/native/graph/search.rs"

      # --- Server handlers: only files exceeding CC/NLOC Codacy limits ---
      # pipeline.rs (771 NLOC): async search pipeline with filter/fusion/scoring branches
      - "crates/velesdb-server/src/handlers/search/pipeline.rs"
      # collections.rs (560 NLOC): CRUD handler with serde deserialization + validation branches
      - "crates/velesdb-server/src/handlers/collections.rs"

      # --- ORDER BY ordering (Lizard false positive: counts impl block + free fn as one unit) ---
      # ScoreContext::new is 5 lines but Lizard merges the impl block with the
      # following evaluate_arithmetic free function, reporting 65 NLOC for "new".
      - "crates/velesdb-core/src/collection/search/query/ordering.rs"

      # --- Query engine internals (legitimately complex pipelines) ---
      - "crates/velesdb-core/src/collection/search/query/union_query.rs"
      - "crates/velesdb-core/src/collection/search/query/hybrid_sparse.rs"
      - "crates/velesdb-core/src/collection/search/query/pushdown.rs"
      - "crates/velesdb-core/src/collection/search/query/aggregation/having.rs"
      - "crates/velesdb-core/src/fusion/strategy.rs"

      # --- Explain formatter (tree rendering with prefix tracking) ---
      - "crates/velesdb-core/src/velesql/explain/formatter.rs"

      # --- Collection helpers (quantization cache, statistics, upsert pipeline) ---
      - "crates/velesdb-core/src/collection/core/crud_helpers.rs"
      - "crates/velesdb-core/src/collection/core/statistics.rs"
      # Lizard false positive: per_point_sequential_updates is 34 NLOC (lizard local)
      # but Codacy online merges adjacent helper fns in the same impl block,
      # reporting 106 NLOC. Same pattern as match_exec/mod.rs above.
      - "crates/velesdb-core/src/collection/core/crud.rs"

      # --- HNSW backend adapter (linear I/O serialization, CC from chained ?) ---
      - "crates/velesdb-core/src/index/hnsw/native/backend_adapter.rs"
      # --- TypeScript query builder (CC from nullish coalescing defaults, not real branches) ---
      - "sdks/typescript/src/query-builder.ts"
      # --- Configuration (validation match arms + serde data definitions) ---
      - "crates/velesdb-core/src/config.rs"
      # --- Query engine DML execution (chained ? in short 18-line function) ---
      - "crates/velesdb-core/src/database/query_engine.rs"
      # --- LlamaIndex graph retriever (many config params, LlamaIndex convention) ---
      - "integrations/llamaindex/src/llamaindex_velesdb/graph_retriever.py"

      # --- LangChain search ops mixin (many thin search variants following SDK pattern) ---
      # File hosts 10+ search method wrappers (similarity, hybrid, batch, multi-query)
      # that share a common structure. Splitting would scatter a cohesive API surface.
      - "integrations/langchain/src/langchain_velesdb/search_ops.py"

      # --- VelesQL FROM/JOIN clause parser (Lizard false positive) ---
      # QuoteState::advance is 37 NLOC (CC=3) but Lizard merges it with the
      # adjacent impl Parser block, reporting 215 NLOC. Same pattern as
      # match_exec/mod.rs and crud.rs false positives above.
      - "crates/velesdb-core/src/velesql/parser/select/clause_from_join.rs"

      # --- Files extracted during the 500-NLOC refactor waves ---
      # The listed files host functions whose original locations were
      # already excluded. The complexity is inherent to the domain and
      # was previously accepted. These exclusions preserve the prior
      # policy after extraction.

      # ColumnStore geo filters — previously in filter.rs. `filter_geo_bbox`
      # walks row coordinates and short-circuits on the 4-corner bounding
      # box test; complexity follows the geometry predicate.
      - "crates/velesdb-core/src/column_store/filter_geo.rs"

      # VelesQL specialized condition parsers — previously in conditions.rs.
      # `parse_similarity_expr`, `parse_geo_distance_expr`, and
      # `parse_geo_bbox_expr` dispatch over pest grammar rule variants;
      # complexity reflects the number of grammar branches.
      - "crates/velesdb-core/src/velesql/parser/conditions_specialized.rs"

      # VelesQL MATCH pattern parser — `parse_path_pattern` walks the pest
      # pair tree over node and edge alternatives with greedy consumption.
      - "crates/velesdb-core/src/velesql/parser/match_patterns.rs"

      # Bulk import pipeline — previously in crud_bulk.rs.
      # `upsert_bulk_from_raw` sequences raw-to-typed conversion, batched
      # WAL sync, and deferred HNSW insert. NLOC reflects the sequential
      # I/O phases, not branch complexity.
      - "crates/velesdb-core/src/collection/core/bulk_import.rs"

  opengrep:
    exclude_paths:
      # Integration memory modules — random.randint used for session-scoped
      # in-process ID counters, not security/crypto material
      - "integrations/langchain/src/langchain_velesdb/memory.py"
      - "integrations/llamaindex/src/llamaindex_velesdb/memory.py"
      # Shared IDs module — random.randint for session-scoped counter seeds,
      # not security/crypto material (collision avoidance, not secret generation)
      - "integrations/common/src/velesdb_common/ids.py"
      # GitHub workflows — dtolnay/rust-toolchain downloads only official
      # Rust binaries from static.rust-lang.org; pinning is handled per-file
      - ".github/workflows/**"
      # Audited unsafe Rust — also listed in global exclude_paths but opengrep's
      # unsafe-usage rule bypasses the global exclusion for this engine.
      # contiguous_ops.rs: RAII-guarded dealloc + ptr::copy_nonoverlapping for
      # cache-locality reordering; all blocks have // SAFETY: comments.
      - "crates/velesdb-core/src/contiguous_ops.rs"
      # mmap_capacity.rs: MmapMut::map_mut after file resize (file was set_len'd
      # to new_len before remapping, ensuring bounds are valid).
      - "crates/velesdb-core/src/storage/mmap_capacity.rs"
      # contiguous_resize.rs: dealloc/realloc path extracted from
      # contiguous_ops.rs to comply with the per-file NLOC budget. Every
      # unsafe block carries // SAFETY: comments documenting layout
      # alignment, ownership, and non-overlapping invariants.
      - "crates/velesdb-core/src/contiguous_resize.rs"
      # contains_text_search in LangChain/LlamaIndex integrations — opengrep's
      # taint analysis cannot track sanitization across Python function calls.
      # All three user-supplied parameters are sanitized before query construction:
      #   - collection: validated by validate_collection_name() → [a-zA-Z0-9_-]+ only
      #   - column:     validated by validate_column_name()     → [a-zA-Z0-9_.]+, must start with letter/underscore
      #   - keyword:    escaped with keyword.replace("'", "''") → SQL-style quote doubling
      # The resulting VelesQL query cannot be injected. False positive from static taint analysis.
      - "integrations/langchain/src/langchain_velesdb/search_ops.py"
      - "integrations/llamaindex/src/llamaindex_velesdb/search_ops.py"
