[alias]
lint = "clippy --all-targets --all-features -- -D warnings"
test-all = "test --all-features"

# =============================================================================
# Multi-Architecture Build Configuration (SOTA 2026)
# =============================================================================
# VelesDB supports multiple target architectures with optimized SIMD:
#
# | Target           | SIMD        | Build Command                            |
# |------------------|-------------|------------------------------------------|
# | x86_64-pc-windows| AVX2/AVX-512| cargo build --release                    |
# | x86_64-unknown-linux| AVX2/AVX-512| cargo build --release --target x86_64-unknown-linux-gnu |
# | aarch64-apple-darwin| NEON     | cargo build --release --target aarch64-apple-darwin |
# | aarch64-unknown-linux| NEON    | cargo build --release --target aarch64-unknown-linux-gnu |
# =============================================================================

# =============================================================================
# Per-target rustflags intentionally omitted.
#
# target-cpu=native must NOT be committed here: proc-macro dylibs are host
# binaries executed by rustc during compilation. If they are compiled with
# native CPU instructions and then restored from a CI cache on a runner with
# a different CPU, rustc crashes with SIGILL/STATUS_ILLEGAL_INSTRUCTION.
#
# Performance flags are handled by [profile.release] and [profile.bench]
# below (opt-level, lto, codegen-units).
#
# To benchmark with full native SIMD locally:
#   RUSTFLAGS="-C target-cpu=native" cargo bench
#
# Portable baseline levels for distribution builds:
#   x86-64-v2: SSE4.2 (2008+)
#   x86-64-v3: AVX2 (2013+)  ← recommended
#   x86-64-v4: AVX-512 (2017+)
# =============================================================================

# Build profiles
[profile.release]
lto = "thin"
codegen-units = 1
panic = "abort"

[profile.release-with-debug]
inherits = "release"
debug = true

# Benchmark profile - optimized but faster compilation
[profile.bench]
lto = "thin"
codegen-units = 1
opt-level = 3

# === LOCAL PERFORMANCE OPTIMIZATION ===
# Uncomment ONLY for local development/benchmarking.
# WARNING: Do NOT commit uncommented — CI runners use generic x86-64 targets.
# [target.x86_64-unknown-linux-gnu]
# rustflags = ["-C", "target-cpu=native"]
# [target.x86_64-pc-windows-msvc]
# rustflags = ["-C", "target-cpu=native"]

# === WASM TARGET ===
# getrandom 0.3+ (pulled in by rand 0.9) requires BOTH the `wasm_js` cargo
# feature AND the `getrandom_backend="wasm_js"` cfg flag to compile for
# wasm32-unknown-unknown. The feature is declared per-crate in
# velesdb-core/Cargo.toml and velesdb-wasm/Cargo.toml; the cfg flag must
# be set globally via rustflags here so every transitive build of
# getrandom on this target sees it.
#
# Without this, CI fails with:
#   "The wasm32-unknown-unknown targets are not supported by default;
#    you may need to enable the 'wasm_js' configuration flag."
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
