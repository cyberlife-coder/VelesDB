name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.8.5)'
        required: true
        type: string
      publish_binaries:
        description: 'Build binaries'
        type: boolean
        default: true
      publish_crates:
        description: 'Publish to crates.io'
        type: boolean
        default: true
      publish_pypi:
        description: 'Publish to PyPI'
        type: boolean
        default: true
      publish_npm:
        description: 'Publish to npm'
        type: boolean
        default: true
      publish_github:
        description: 'Create GitHub Release'
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  checks: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_VERSION: '1.89'

jobs:
  # ===========================================================================
  # 1. Validate & Extract Version
  # ===========================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Accept an operator-entered "v3.9.0" the same as "3.9.0": every
            # downstream comparison (crates.io/npm publish gates, REL-07)
            # expects the unprefixed form, matching the tag-derived path below.
            VERSION="${INPUT_VERSION#v}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          [[ "$VERSION" == *"-"* ]] && echo "is_prerelease=true" >> $GITHUB_OUTPUT || echo "is_prerelease=false" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Verify CI passed on tagged commit (REL-06)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          echo "Checking CI status for commit $SHA..."

          # Query check runs for this commit (paginated: a release-track commit can carry 30+ check-runs,
          # so the default 30/page can omit "CI Success" and silently fail REL-06).
          RESULT=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs?per_page=100" --paginate \
            --jq '[.check_runs[] | select(.name == "CI Success")] | first')

          if [ -z "$RESULT" ] || [ "$RESULT" = "null" ]; then
            echo "::error::No CI workflow found for commit $SHA. Push to main/develop first to trigger CI, then tag."
            exit 1
          fi

          CONCLUSION=$(echo "$RESULT" | jq -r '.conclusion // empty')
          STATUS=$(echo "$RESULT" | jq -r '.status // empty')

          if [ "$STATUS" != "completed" ]; then
            echo "::error::CI is still running ($STATUS) on commit $SHA. Wait for CI to complete before tagging."
            exit 1
          fi

          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::CI failed ($CONCLUSION) on commit $SHA. Fix CI before releasing."
            exit 1
          fi

          echo "CI passed on commit $SHA"

      # v3.9.0 shipped with satellite manifests (TS SDK, guest-js, Python
      # integrations) still on 3.8.1: their npm/PyPI publish jobs "succeeded"
      # as silent no-ops on already-published versions. This gate makes a
      # partial harmonization impossible to tag again.
      - name: Verify version sync across policed manifests (REL-07)
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
          IS_PRERELEASE: ${{ steps.version.outputs.is_prerelease }}
        run: |
          python3 scripts/check-version-sync.py
          if [ "$IS_PRERELEASE" = "false" ]; then
            WORKSPACE_VERSION=$(sed -n '/\[workspace.package\]/,/^\[/p' Cargo.toml | sed -n 's/^version = "\(.*\)"/\1/p' | head -1)
            if [ "$WORKSPACE_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::Tag v$TAG_VERSION does not match workspace version $WORKSPACE_VERSION. Run scripts/bump_version.py $TAG_VERSION before tagging."
              exit 1
            fi
            echo "Tag matches workspace version $WORKSPACE_VERSION; all policed manifests in sync."
          fi

  # ===========================================================================
  # 1b. Pre-publish Validation Gate (REL-05)
  # ===========================================================================
  validate-all:
    name: Pre-publish validation
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "validate-all"
      - name: Run workspace tests
        run: |
          cargo test --workspace --features persistence,gpu,update-check \
            --exclude velesdb-python --exclude velesdb-node -- --test-threads=1
      - name: Verify publish readiness
        run: |
          # Only dry-run velesdb-core (root crate, no workspace deps).
          # Dependent crates cannot be validated here because velesdb-core
          # ^1.5.x isn't on crates.io yet (chicken-and-egg). They are
          # validated at actual publish time (with retries) in the
          # publish-crates job which publishes in dependency order.
          echo "📦 Full dry-run for velesdb-core..."
          cargo publish --dry-run -p velesdb-core
          echo "✅ velesdb-core packaging validated"
          echo "ℹ️  Dependent crates skipped (validated at publish time)"

  # ===========================================================================
  # 2. Build Binaries (Linux, Windows, macOS)
  # ===========================================================================
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: validate
    if: github.event_name == 'push' || inputs.publish_binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest, ext: tar.gz }
          - { target: x86_64-pc-windows-msvc, os: windows-latest, ext: zip }
          - { target: aarch64-apple-darwin, os: macos-latest, ext: tar.gz }
          - { target: x86_64-apple-darwin, os: macos-latest, ext: tar.gz }

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Cache apt packages (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "release-${{ matrix.target }}"

      - name: Install cargo-deb (Linux)
        if: runner.os == 'Linux'
        run: cargo install cargo-deb --locked

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p velesdb-cli -p velesdb-server -p velesdb-migrate -p velesdb-memory

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir dist && cp target/${{ matrix.target }}/release/velesdb target/${{ matrix.target }}/release/velesdb-server target/${{ matrix.target }}/release/velesdb-migrate target/${{ matrix.target }}/release/velesdb-memory dist/ 2>/dev/null || true
          cp README.md LICENSE dist/
          tar -czvf velesdb-${{ matrix.target }}.${{ matrix.ext }} -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          Copy-Item target/${{ matrix.target }}/release/*.exe dist/ -ErrorAction SilentlyContinue
          Copy-Item README.md,LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath velesdb-${{ matrix.target }}.${{ matrix.ext }}

      - name: Build .deb (Linux)
        if: runner.os == 'Linux'
        run: |
          cargo deb -p velesdb-cli --no-build --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/debian/*.deb velesdb-${{ needs.validate.outputs.version }}-amd64.deb

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip
            *.deb

  # ===========================================================================
  # 3. Publish to crates.io (each crate independently)
  # ===========================================================================
  publish-crates:
    name: Publish crates.io
    runs-on: ubuntu-latest
    needs: [validate, validate-all]
    if: |
      needs.validate.outputs.is_prerelease == 'false' &&
      (github.event_name == 'push' || inputs.publish_crates)
    environment: crates-io
    env:
      # velesdb-memory is intentionally absent: it is versioned independently
      # (0.x) and ships on its own `velesdb-memory-vX.Y.Z` tag via
      # release-memory.yml, so it does not ride the workspace 3.x release tag.
      CRATES_TO_PUBLISH: "velesdb-core velesdb-server velesdb-cli velesdb-migrate velesdb-mobile tauri-plugin-velesdb"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "publish-crates"

      - name: Validate workspace version
        run: |
          WORKSPACE_VERSION=$(python - <<'PY'
          import tomllib
          with open('Cargo.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['workspace']['package']['version'])
          PY
          )
          if [ "$WORKSPACE_VERSION" != "${{ needs.validate.outputs.version }}" ]; then
            echo "❌ Workspace version ($WORKSPACE_VERSION) does not match release version (${{ needs.validate.outputs.version }})"
            exit 1
          fi
          echo "✅ Workspace version: $WORKSPACE_VERSION"

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          for crate in $CRATES_TO_PUBLISH; do
            echo "📦 Publishing $crate..."
            success=0
            for attempt in 1 2 3; do
              if cargo publish --locked -p "$crate"; then
                success=1
                break
              fi
              echo "⚠️ Publish failed for $crate (attempt $attempt/3), retrying in 15s..."
              sleep 15
            done
            if [ "$success" -ne 1 ]; then
              echo "❌ Failed to publish $crate after 3 attempts"
              exit 1
            fi
            echo "✅ Published $crate"
          done

      - name: Verify crates.io versions
        run: |
          chmod +x scripts/check-crates-io-versions.sh
          scripts/check-crates-io-versions.sh "${{ needs.validate.outputs.version }}" $CRATES_TO_PUBLISH

  # ===========================================================================
  # 4a. Publish to PyPI — Cross-platform wheels (REL-02)
  # ===========================================================================
  publish-pypi-wheels:
    name: PyPI wheels ${{ matrix.target }} ${{ matrix.manylinux }}
    runs-on: ${{ matrix.os }}
    needs: [validate, validate-all]
    if: |
      needs.validate.outputs.is_prerelease == 'false' &&
      (github.event_name == 'push' || inputs.publish_pypi)
    environment: pypi
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux glibc (manylinux2014 = glibc 2.17+) ---
          - { os: ubuntu-latest, target: x86_64, manylinux: auto }
          - { os: ubuntu-latest, target: aarch64, manylinux: auto }
          # --- Linux musl (Alpine / python:*-alpine containers) ---
          - { os: ubuntu-latest, target: x86_64, manylinux: musllinux_1_2 }
          - { os: ubuntu-latest, target: aarch64, manylinux: musllinux_1_2 }
          # --- macOS: universal2 = arm64 + x86_64 in a single wheel (covers Intel Macs,
          #     and avoids the unreliable macos-13 x86_64 runner — see KNOWN_LIMITATIONS.md § 5) ---
          - { os: macos-14, target: universal2-apple-darwin }
          # --- Windows ---
          - { os: windows-latest, target: x64 }
          - { os: windows-latest, target: aarch64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: |
            3.10
            3.11
      - uses: PyO3/maturin-action@db323e2cf5679b7feb8bcb561a36b27a0bc19e79 # v1
        with:
          target: ${{ matrix.target }}
          working-directory: crates/velesdb-python
          # abi3-py39: a single cp39-abi3 wheel covers Python 3.9+, and not pinning an
          # interpreter keeps cross-compiled targets (universal2, win-arm64) reliable.
          args: --release --out dist
          manylinux: ${{ matrix.manylinux || '' }}
      # gh-action-pypi-publish only runs on Linux; upload wheel directly on other OSes
      - name: Publish to PyPI (Linux)
        if: runner.os == 'Linux'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: crates/velesdb-python/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
      - name: Publish to PyPI (non-Linux)
        if: runner.os != 'Linux'
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload --skip-existing -u __token__ crates/velesdb-python/dist/*

  # ===========================================================================
  # 4a-bis. Publish to PyPI — source distribution (build-from-source fallback)
  # Covers any platform without a prebuilt wheel (PyPy, exotic/32-bit arches,
  # older glibc) as long as a Rust toolchain is present. (REL-02)
  # ===========================================================================
  publish-pypi-sdist:
    name: PyPI sdist
    runs-on: ubuntu-latest
    needs: [validate, validate-all]
    if: |
      needs.validate.outputs.is_prerelease == 'false' &&
      (github.event_name == 'push' || inputs.publish_pypi)
    environment: pypi
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
      - uses: PyO3/maturin-action@db323e2cf5679b7feb8bcb561a36b27a0bc19e79 # v1
        with:
          command: sdist
          working-directory: crates/velesdb-python
          args: --out dist
      - name: Publish sdist to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: crates/velesdb-python/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  # ===========================================================================
  # 4b. Publish to PyPI — velesdb-common (must land before integrations)
  # ===========================================================================
  publish-pypi-common:
    name: Publish PyPI velesdb-common
    runs-on: ubuntu-latest
    needs: [validate, validate-all]
    if: |
      needs.validate.outputs.is_prerelease == 'false' &&
      (github.event_name == 'push' || inputs.publish_pypi)
    environment: pypi
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
      - name: Build velesdb-common
        run: |
          cd integrations/common
          pip install build
          python -m build
      - name: Publish velesdb-common to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: integrations/common/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  # ===========================================================================
  # 4c. Publish to PyPI — Integration packages (depend on velesdb-common)
  # ===========================================================================
  publish-pypi-pure:
    name: Publish PyPI ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: [validate, validate-all, publish-pypi-common]
    if: |
      needs.validate.outputs.is_prerelease == 'false' &&
      (github.event_name == 'push' || inputs.publish_pypi)
    environment: pypi
    strategy:
      fail-fast: false
      matrix:
        package:
          - langchain-velesdb
          - llamaindex-velesdb
          - haystack-velesdb
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Build langchain-velesdb
        if: matrix.package == 'langchain-velesdb'
        run: |
          cd integrations/langchain
          pip install build
          python -m build

      - name: Publish langchain-velesdb to PyPI
        if: matrix.package == 'langchain-velesdb'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: integrations/langchain/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Build llamaindex-velesdb
        if: matrix.package == 'llamaindex-velesdb'
        run: |
          cd integrations/llamaindex
          pip install build hatchling
          python -m build

      - name: Publish llamaindex-velesdb to PyPI
        if: matrix.package == 'llamaindex-velesdb'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: integrations/llamaindex/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Build haystack-velesdb
        if: matrix.package == 'haystack-velesdb'
        run: |
          cd integrations/haystack
          pip install build
          python -m build

      - name: Publish haystack-velesdb to PyPI
        if: matrix.package == 'haystack-velesdb'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: integrations/haystack/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  # ===========================================================================
  # 5. Publish to npm (each package independently)
  # ===========================================================================
  publish-npm:
    name: Publish npm ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: [validate, validate-all]
    if: |
      needs.validate.outputs.is_prerelease == 'false' &&
      (github.event_name == 'push' || inputs.publish_npm)
    environment: npm
    strategy:
      fail-fast: false
      matrix:
        package:
          - wasm
          - typescript-sdk
          - tauri-plugin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Rust (wasm only)
        if: matrix.package == 'wasm'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        if: matrix.package == 'wasm'
        run: cargo install wasm-pack --locked

      - name: Build & Publish WASM
        if: matrix.package == 'wasm'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd crates/velesdb-wasm
          wasm-pack build --target web --release
          cd pkg
          VERSION=${{ needs.validate.outputs.version }}
          node -e "const p=require('./package.json'); p.name='@wiscale/velesdb-wasm'; p.version='$VERSION'; require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
          # Publish, but only tolerate a genuine "already published" (same version
          # on npm). Any other failure (auth/E404-on-PUT, registry) MUST fail the
          # job — do not swallow it (regression guard: v1.16.0 npm publish failed
          # silently on an expired token and shipped nothing).
          if npm publish --access public; then
            echo "✅ published @wiscale/velesdb-wasm@$VERSION"
          elif npm view "@wiscale/velesdb-wasm@$VERSION" version >/dev/null 2>&1; then
            echo "⏭️ @wiscale/velesdb-wasm@$VERSION already on npm — skipping"
          else
            echo "❌ npm publish FAILED for @wiscale/velesdb-wasm@$VERSION (auth/registry error, NOT already-published)"; exit 1
          fi

      - name: Build & Publish TypeScript SDK
        if: matrix.package == 'typescript-sdk'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd sdks/typescript
          npm install && npm run build
          PKG_VERSION=$(node -p "require('./package.json').version")
          # The PUBLISHED package pins @wiscale/velesdb-wasm to this release
          # (the memory wedge needs the wasm build shipping WasmMemoryService),
          # so npm enforces the capability floor at install/upgrade time. The
          # in-repo range stays ^3.0.0 because CI's npm ci must resolve against
          # the committed lockfile before the new wasm version exists on npm —
          # same patch-at-publish pattern as the wasm package.json above.
          # Patched AFTER install/build: publish doesn't resolve ranges, but
          # install would fail on a not-yet-published sibling version.
          #
          # The wasm package publishes from a PARALLEL matrix leg (slower: it
          # compiles Rust), so wait for it before publishing a manifest that
          # points at it — otherwise the SDK ships uninstallable (ETARGET)
          # until/unless the wasm leg lands. Bounded wait, then hard fail:
          # better an unpublished SDK leg (re-runnable via workflow_dispatch)
          # than an immutably published one requiring a ghost version.
          # Poll the RANGE the manifest will carry (not the exact version:
          # a patch-level drift between the SDK's package.json and the tag
          # must not strand the publish when ^X.Y.0 would resolve fine), and
          # bypass npm's packument cache each attempt (--prefer-online) so a
          # late sibling publish is seen within one iteration. npm view's
          # exit code on an unmatched range is unreliable across versions —
          # test for non-empty output instead.
          for i in $(seq 1 40); do
            if [ -n "$(npm view "@wiscale/velesdb-wasm@^$PKG_VERSION" version --prefer-online 2>/dev/null)" ]; then
              break
            fi
            if [ "$i" = "40" ]; then
              echo "❌ no @wiscale/velesdb-wasm matching ^$PKG_VERSION on npm after 10 min — not publishing an SDK that depends on it"; exit 1
            fi
            echo "⏳ waiting for @wiscale/velesdb-wasm@^$PKG_VERSION on npm ($i/40)"; sleep 15
          done
          node -e "const p=require('./package.json'); p.dependencies['@wiscale/velesdb-wasm']='^'+p.version; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
          if npm publish --access public; then
            echo "✅ published @wiscale/velesdb-sdk@$PKG_VERSION"
          elif npm view "@wiscale/velesdb-sdk@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "⏭️ @wiscale/velesdb-sdk@$PKG_VERSION already on npm — skipping"
          else
            echo "❌ npm publish FAILED for @wiscale/velesdb-sdk@$PKG_VERSION (auth/registry error, NOT already-published)"; exit 1
          fi

      - name: Build & Publish Tauri Plugin
        if: matrix.package == 'tauri-plugin'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd crates/tauri-plugin-velesdb/guest-js
          npm install && npm run build
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm publish --access public; then
            echo "✅ published @wiscale/tauri-plugin-velesdb@$PKG_VERSION"
          elif npm view "@wiscale/tauri-plugin-velesdb@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "⏭️ @wiscale/tauri-plugin-velesdb@$PKG_VERSION already on npm — skipping"
          else
            echo "❌ npm publish FAILED for @wiscale/tauri-plugin-velesdb@$PKG_VERSION (auth/registry error, NOT already-published)"; exit 1
          fi

  # ===========================================================================
  # 6. Create GitHub Release
  # ===========================================================================
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: |
      always() &&
      needs.validate.result == 'success' &&
      (github.event_name == 'push' || inputs.publish_github) &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        # Tolerates the republish-without-binaries dispatch path (build
        # skipped -> no artifacts directory): checksums are only generated
        # when binaries were actually downloaded.
        run: |
          mkdir -p artifacts
          cd artifacts
          if ls * >/dev/null 2>&1; then
            sha256sum * > SHA256SUMS
            echo "Published checksums:" && cat SHA256SUMS
          else
            echo "No binary artifacts in this run — skipping SHA256SUMS"
          fi

      - name: Extract release notes from CHANGELOG
        run: |
          # Extract everything between ## [version] and the next ## [
          sed -n '/^## \['"${{ needs.validate.outputs.version }}"'\]/,/^## \[/p' CHANGELOG.md | head -n -1 > RELEASE_NOTES.md
          # Fallback to git log if CHANGELOG section not found
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "## What's Changed" > RELEASE_NOTES.md
            PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            [ -n "$PREV" ] && git log --pretty="- %s" $PREV..HEAD >> RELEASE_NOTES.md || echo "- Initial release" >> RELEASE_NOTES.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: VelesDB v${{ needs.validate.outputs.version }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          files: artifacts/*
          generate_release_notes: true

  # ===========================================================================
  # 7. Summary
  # ===========================================================================
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [validate, build, publish-crates, publish-pypi-wheels, publish-pypi-common, publish-pypi-pure, publish-npm, github-release]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🚀 Release v${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Results" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Binaries | ${{ needs.build.result == 'success' && '✅' || (needs.build.result == 'skipped' && '⏭️' || '❌') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| crates.io | ${{ needs.publish-crates.result == 'success' && '✅' || (needs.publish-crates.result == 'skipped' && '⏭️' || '⚠️') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PyPI wheels | ${{ needs.publish-pypi-wheels.result == 'success' && '✅' || (needs.publish-pypi-wheels.result == 'skipped' && '⏭️' || '⚠️') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PyPI common | ${{ needs.publish-pypi-common.result == 'success' && '✅' || (needs.publish-pypi-common.result == 'skipped' && '⏭️' || '⚠️') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PyPI pure | ${{ needs.publish-pypi-pure.result == 'success' && '✅' || (needs.publish-pypi-pure.result == 'skipped' && '⏭️' || '⚠️') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm | ${{ needs.publish-npm.result == 'success' && '✅' || (needs.publish-npm.result == 'skipped' && '⏭️' || '⚠️') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ${{ needs.github-release.result == 'success' && '✅' || (needs.github-release.result == 'skipped' && '⏭️' || '❌') }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 Re-run Options" >> $GITHUB_STEP_SUMMARY
          echo "Use **workflow_dispatch** to re-run specific components without re-tagging:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Select only failed components" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Each crate/package runs independently" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ fail-fast: false - one failure doesn't block others" >> $GITHUB_STEP_SUMMARY
