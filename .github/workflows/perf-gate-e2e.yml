name: Perf Gate (E2E)

# Enforces the recall and order-of-magnitude latency claims that
# QUALITY_BAR.md Gates 1 & 2 advertise. Until this workflow existed, both
# claims were validated only by local runs of `benchmarks/velesdb_benchmark.py`.
#
# CI hardware vs. the contract:
#   - The canonical 450 µs p50 is measured on the i9-14900KF reference
#     machine (see QUALITY_BAR.md §Gate 2). GitHub-hosted ubuntu-latest
#     runners are ~3-4× slower and noisier, so this job gates p50 at a
#     deliberately loose 1500 µs (an order-of-magnitude sanity floor).
#     The intent is to catch real algorithmic regressions (HNSW reorder
#     loops, WAL fsync stalls, missing SIMD codepath, etc.) without
#     producing false positives from runner variance. The full 450 µs
#     contract is validated locally and in release engineering.
#   - Recall@10 (Gate 1) is hardware-independent and gated at the
#     contract threshold of 0.95.

on:
  push:
    branches: [develop, main]
    paths:
      - "crates/velesdb-core/src/index/**"
      - "crates/velesdb-core/src/simd_native/**"
      - "crates/velesdb-core/src/quantization/**"
      - "crates/velesdb-core/src/fusion/**"
      - "crates/velesdb-core/src/wal/**"
      - "crates/velesdb-core/src/storage/**"
      - "crates/velesdb-python/**"
      - "benchmarks/velesdb_benchmark.py"
      - ".github/workflows/perf-gate-e2e.yml"
  pull_request:
    branches: [develop, main]
    paths:
      - "crates/velesdb-core/src/index/**"
      - "crates/velesdb-core/src/simd_native/**"
      - "crates/velesdb-core/src/quantization/**"
      - "crates/velesdb-core/src/fusion/**"
      - "crates/velesdb-core/src/wal/**"
      - "crates/velesdb-core/src/storage/**"
      - "crates/velesdb-python/**"
      - "benchmarks/velesdb_benchmark.py"
      - ".github/workflows/perf-gate-e2e.yml"
  schedule:
    # Nightly 100K-scale recall validation (the PR gate runs at 10K).
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: perf-gate-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Loose order-of-magnitude floor — see header comment.
  P50_MAX_US: 1500
  RECALL_MIN: 0.95

jobs:
  perf-gate:
    name: Recall ≥ 0.95 + p50 sanity floor (10K/384D)
    # The 10K gate covers pushes, PRs, and manual dispatch; the nightly
    # schedule only runs the 100K job below.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: "1.90"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-perf-gate"

      - name: Build velesdb-python (release wheel)
        run: |
          python -m pip install --upgrade pip "maturin>=1.7,<2" numpy
          # Release build is mandatory for a perf gate — debug builds are
          # 10×+ slower and force a meaningless threshold. We build a
          # release wheel and pip-install it; `maturin develop` would
          # complain about installing into the system interpreter in CI,
          # and pip's PEP 517 path does not currently forward `--release`
          # cleanly (see commentary in ci.yml §test for the history).
          cd crates/velesdb-python
          maturin build --release --interpreter python3.11
          pip install --force-reinstall ../../target/wheels/velesdb-*.whl

      - name: Run benchmark (10K vectors, 384D, --recall, --json)
        run: |
          python benchmarks/velesdb_benchmark.py \
            --datasets 10000 \
            --dimension 384 \
            --recall \
            --json \
            --output perf-report.json

      - name: Gate report on recall and p50 floor
        id: gate
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          with open("perf-report.json") as f:
              report = json.load(f)

          p50_max_us = int(os.environ["P50_MAX_US"])
          recall_min = float(os.environ["RECALL_MIN"])

          # Find the 10K result block.
          ten_k = next(
              (r for r in report["results"] if r.get("num_vectors") == 10_000),
              None,
          )
          if ten_k is None:
              sys.exit("FAIL: no 10K result block in report")

          p50 = ten_k["search_p50_us"]
          p99 = ten_k["search_p99_us"]
          recall = report.get("recall", {}).get("recall_at_10_mean", 0.0)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          lines = [
              "## Perf Gate (E2E) — 10K / 384D / WAL ON",
              "",
              f"- search p50: **{p50} µs** (CI floor: {p50_max_us} µs, contract on i9-14900KF: 450 µs)",
              f"- search p99: {p99} µs",
              f"- recall@10: **{recall:.4f}** (gate: ≥ {recall_min})",
              "",
          ]
          if summary_path:
              with open(summary_path, "a") as s:
                  s.write("\n".join(lines) + "\n")
          for line in lines:
              print(line)

          failed = []
          if recall < recall_min:
              failed.append(f"recall@10 {recall:.4f} < {recall_min}")
          if p50 > p50_max_us:
              failed.append(f"p50 {p50} µs > CI floor {p50_max_us} µs")
          if failed:
              sys.exit("FAIL: " + "; ".join(failed))
          print("PASS")
          PY

      - name: Upload perf report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf-report-${{ github.sha }}
          path: perf-report.json
          retention-days: 30

  # ===========================================================================
  # Scheduled 100K-scale recall validation (QUALITY_BAR.md Gate 1 at scale)
  #
  # The PR gate above validates recall at 10K vectors. HNSW recall can degrade
  # with index size in ways a 10K run cannot detect (entry-point drift, layer
  # distribution, ef_search headroom), so this job re-validates recall@10 at
  # 100K vectors nightly and on manual dispatch. Latency is reported but not
  # gated: runner variance at this scale would produce false positives.
  # ===========================================================================
  recall-100k:
    name: Scheduled Recall ≥ 0.95 (100K/384D)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: "1.90"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-perf-gate"

      - name: Build velesdb-python (release wheel)
        run: |
          python -m pip install --upgrade pip "maturin>=1.7,<2" numpy
          cd crates/velesdb-python
          maturin build --release --interpreter python3.11
          pip install --force-reinstall ../../target/wheels/velesdb-*.whl

      - name: Run benchmark (100K vectors, 384D, --recall, --json)
        run: |
          python benchmarks/velesdb_benchmark.py \
            --datasets 100000 \
            --dimension 384 \
            --recall \
            --json \
            --output perf-report-100k.json

      - name: Gate report on recall@10
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          with open("perf-report-100k.json") as f:
              report = json.load(f)

          recall_min = float(os.environ["RECALL_MIN"])

          hundred_k = next(
              (r for r in report["results"] if r.get("num_vectors") == 100_000),
              None,
          )
          if hundred_k is None:
              sys.exit("FAIL: no 100K result block in report")

          recall = report.get("recall", {}).get("recall_at_10_mean", 0.0)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          lines = [
              "## Scheduled Recall Gate — 100K / 384D / WAL ON",
              "",
              f"- recall@10: **{recall:.4f}** (gate: ≥ {recall_min})",
              f"- search p50: {hundred_k['search_p50_us']} µs (informational, not gated)",
              f"- search p99: {hundred_k['search_p99_us']} µs (informational, not gated)",
              "",
          ]
          if summary_path:
              with open(summary_path, "a") as s:
                  s.write("\n".join(lines) + "\n")
          for line in lines:
              print(line)

          if recall < recall_min:
              sys.exit(f"FAIL: recall@10 {recall:.4f} < {recall_min} at 100K")
          print("PASS")
          PY

      - name: Upload perf report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf-report-100k-${{ github.sha }}
          path: perf-report-100k.json
          retention-days: 90

  # ===========================================================================
  # Scheduled Rust 100K multi-mode recall gate
  #
  # The Python job above re-checks 100K recall on the production search path for
  # the default quality. This job complements it with the native Rust gate
  # (`tests/scale_recall_100k.rs`), which validates ALL four quality modes
  # (Fast ≥ 0.90, Balanced ≥ 0.95, Accurate ≥ 0.98, Perfect = 1.00) against a
  # brute-force ground truth. Those tests are `#[ignore]` (too slow for the PR
  # suite), so without this job they never ran in CI.
  # ===========================================================================
  recall-100k-rust:
    name: Scheduled Rust 100K recall (Fast/Balanced/Accurate/Perfect)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: "1.90"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-perf-gate"

      - name: Run 100K multi-mode recall gate (brute-force ground truth)
        # The test asserts all four per-mode thresholds internally, so a
        # recall regression at scale fails the job. Single-threaded: the suite
        # shares filesystem state (CLAUDE.md). --release is mandatory here —
        # debug-mode HNSW insert/search at 100K vectors is an order of
        # magnitude slower and blows the job's timeout budget (see the
        # sibling Python 100K job's rationale above).
        run: |
          cargo test -p velesdb-core --release --test scale_recall_100k \
            --features persistence -- --ignored --nocapture --test-threads=1
