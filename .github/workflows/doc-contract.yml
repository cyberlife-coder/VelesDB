name: Doc Contract

on:
  push:
    branches: [main, develop]
    paths:
      - 'README.md'
      - 'crates/velesdb-server/src/main.rs'
      - 'scripts/check-doc-contract.sh'
      - '.github/workflows/doc-contract.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'README.md'
      - 'crates/velesdb-server/src/main.rs'
      - 'scripts/check-doc-contract.sh'
      - '.github/workflows/doc-contract.yml'

permissions:
  contents: read

jobs:
  contract:
    name: README Runtime Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check README/runtime contract
        run: bash scripts/check-doc-contract.sh
