name: Propagation Guard

on:
  push:
    branches: [main, develop]
    paths:
      - "crates/**"
      - "sdks/typescript/**"
      - "integrations/**"
      - "demos/**"
      - "examples/**"
      - "conformance/**"
      - "docs/**"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/config.toml"
      - ".github/workflows/propagation-guard.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "crates/**"
      - "sdks/typescript/**"
      - "integrations/**"
      - "demos/**"
      - "examples/**"
      - "conformance/**"
      - "docs/**"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/config.toml"
      - ".github/workflows/propagation-guard.yml"

concurrency:
  group: propagation-guard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-cross-crate:
    name: Rust Cross-Crate Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: "1.86"
      - name: Install Linux build deps
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
      - name: Cargo check propagated crates
        run: |
          cargo check \
            -p velesdb-core \
            -p velesdb-server \
            -p velesdb-cli \
            -p tauri-plugin-velesdb \
            -p velesdb-wasm \
            -p velesdb-mobile \
            -p velesdb-migrate

  python-sdk:
    name: Python SDK Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: "1.86"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
      - name: Cargo check velesdb-python
        env:
          PYO3_PYTHON: python3
        run: cargo check -p velesdb-python
      - name: Python packaging smoke
        run: |
          python -m py_compile crates/velesdb-python/python/velesdb/*.py

  typescript-sdk:
    name: TypeScript SDK Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: sdks/typescript/package-lock.json
      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm ci
      - name: Typecheck
        working-directory: sdks/typescript
        run: npm run typecheck
      - name: Run contract + wasm parity tests
        working-directory: sdks/typescript
        run: |
          npm test -- velesql-contract-fixtures.test.ts
          npm test -- wasm-backend.test.ts

  integrations-python:
    name: Python Integrations Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Static integration checks
        run: bash scripts/check-python.sh
      - name: Python complexity gate (CC <= 8)
        run: |
          pip install flake8 mccabe
          flake8 integrations/ --select=C901,E999 --max-complexity=8
      - name: Install velesdb-common (local shared package)
        run: pip install -e integrations/common
      - name: LangChain parity tests
        working-directory: integrations/langchain
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest tests/test_core_feature_parity.py -q
      - name: LlamaIndex parity tests
        working-directory: integrations/llamaindex
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest tests/test_core_parity.py -q
      - name: Haystack stub-based unit tests
        working-directory: integrations/haystack
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # The unit suite stubs out haystack + velesdb so it runs offline.
          # The real-haystack integration file (test_real_haystack_integration.py)
          # auto-skips here and is exercised in the dedicated job below.
          pytest tests/ -q
      - name: Haystack example AST check (VelesRetriever has @component)
        # Catches the bug class that v1.14.2 audit found: a Pipeline component
        # missing the @component decorator. Pipeline.add_component() rejects
        # undecorated classes at runtime; this static check fails fast.
        run: |
          python - <<'PY'
          import ast, sys
          path = "integrations/haystack/examples/rag_pipeline.py"
          tree = ast.parse(open(path).read())
          for node in ast.walk(tree):
              if isinstance(node, ast.ClassDef) and node.name.endswith("Retriever"):
                  decos = [ast.unparse(d) for d in node.decorator_list]
                  if "component" not in decos:
                      print(
                          f"::error file={path}::class {node.name} is used as a "
                          "Haystack Pipeline component but is missing the "
                          "@component decorator (Pipeline.add_component will reject it)."
                      )
                      sys.exit(1)
          print("OK: every *Retriever class in rag_pipeline.py is @component-decorated")
          PY

  haystack-real-integration:
    # Heavyweight job: installs haystack-ai + the published velesdb wheel
    # and exercises tests/test_real_haystack_integration.py end-to-end. The
    # stub-based unit suite above (Python Integrations Check) auto-skips
    # this file; this job is the only place protocol drift between the
    # connector and the real Haystack 2.x runtime is caught.
    name: Haystack Real Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install haystack-ai + published velesdb wheel + this connector
        working-directory: integrations/haystack
        run: |
          python -m pip install --upgrade pip
          # Pin velesdb to the workspace floor declared in pyproject (>=1.14.0)
          # — pip will resolve to the latest published patch on PyPI.
          pip install "velesdb>=1.14.0" "haystack-ai>=2.0.0"
          pip install -e ../common
          pip install -e ".[dev]"
      - name: Run real Haystack integration suite
        working-directory: integrations/haystack
        run: |
          pytest tests/test_real_haystack_integration.py -v --no-header

  demos-examples-smoke:
    name: Demos and Examples Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: "1.86"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            demos/tauri-rag-app/package-lock.json
            sdks/typescript/package-lock.json
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
      - name: Rust examples compile smoke
        run: cargo check --manifest-path examples/rust/Cargo.toml
      - name: Python examples syntax smoke
        run: |
          python -m py_compile examples/python_example.py
          python -m py_compile examples/python/*.py
          # Integration-level examples — must at least compile cleanly so a
          # user copying the file into their project doesn't hit a SyntaxError.
          python -m py_compile integrations/haystack/examples/rag_pipeline.py
      - name: Tauri demo frontend build smoke
        working-directory: demos/tauri-rag-app
        run: |
          npm ci
          npm run build

  contract-doc-guards:
    name: Contract and Doc Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: TODO/FIXME/HACK governance
        run: python scripts/check-todo-annotations.py
      - name: Promise contract
        run: python scripts/check-promise-contract.py
      - name: Doc contract
        run: bash scripts/check-doc-contract.sh

  core-regressions:
    name: Core Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: "1.86"
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          shared-key: "propagation-regressions"
      - name: Traversal and create-guard regressions
        run: |
          cargo test -p velesdb-core -- \
            test_create_collection_rejects_existing_on_disk_dir_not_loaded \
            test_traverse_bfs_config_respects_min_depth \
            test_legacy_traverse_paths_use_edge_ids
