# =============================================================================
# VelesDB Core - Continuous Integration Workflow (Optimized)
# =============================================================================
# Stratégie ultra-optimisée pour réduire les coûts GitHub Actions :
# - Jobs parallèles (lint, test, security en même temps)
# - Cache unifié et partagé entre jobs
# - Outils pré-compilés via taiki-e/install-action
# - Path filtering agressif
# - PR: validation minimale | main: coverage + benchmarks complets
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - '*.md'
      - 'crates/**'
      - 'sdks/typescript/**'
      - 'conformance/**'
      - 'benchmarks/**'
      - 'examples/**'
      - 'scripts/**'
      - 'docs/reference/**'
      - 'integrations/**'
      - 'demos/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - 'sonar-project.properties'
      - '.github/workflows/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
  # No `paths:` filter here (unlike push, above): the "CI Success" job is a
  # required status check on main/develop branch protection. A path filter
  # on `pull_request` means GitHub creates zero check-runs for a PR whose
  # diff touches none of the listed paths (a pure backmerge, a docs-only
  # change outside docs/reference/**, a PR that's a no-op relative to base)
  # — not "failing", but *absent*, which blocks the merge forever with no
  # way to resolve it short of a manual `workflow_dispatch`. Hit in
  # production: PR #1465 (a zero-diff backmerge) sat blocked for ~7h before
  # this was diagnosed. Required checks must always run; only the
  # cost-saving `push` trigger (which doesn't gate anything) should be
  # path-filtered.
  pull_request:
    branches: [main, develop]
  # Manual trigger so coverage can be refreshed on demand (e.g. after a
  # config-only commit to main that skipped the path-filtered CI, leaving the
  # Codacy coverage badge stale).
  workflow_dispatch:

# Annuler les runs précédents pour la même branche/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  # 1.90 is the workspace MSRV: roaring 0.11.4 declares rust-version = 1.90.0,
  # so a 1.89 toolchain only builds when the dep is already in cache.
  RUST_VERSION: "1.90"
  # Skip Python detection for pyo3 - avoids environment contamination issues
  PYO3_NO_PYTHON: "1"

jobs:
  # ===========================================================================
  # Lint & Format (parallèle avec test et security)
  # ===========================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-ci"
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      # rust-cache restores target/ INCLUDING the clippy .fingerprint entries
      # for workspace crates. With warm fingerprints cargo skips re-linting
      # "unchanged" crates, so violations of lints that became enforced after
      # the fingerprint was cached are silently skipped. This bit for real:
      # the 1.89 pedantic debt was only discovered via a chance fingerprint
      # miss (PRs #1394/#1396). Dropping build artifacts for the workspace
      # crates ONLY forces a full re-lint of first-party code on every run
      # while keeping all third-party deps cached (moderate cost, ~1-3 min).
      - name: Drop cached workspace fingerprints (force full re-lint)
        run: |
          set -euo pipefail
          # -r: never run a bare `cargo clean` (full wipe) on empty input.
          cargo metadata --format-version 1 --no-deps --locked \
            | jq -r '.packages[] | "-p", .name' \
            | xargs -r cargo clean

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Closes the --no-default-features matrix gap from #1472: nothing in CI
      # previously checked the workspace with every crate's own default
      # features disabled, so cross-crate feature-unification mismatches
      # (e.g. a cfg-gated call site in one crate vs. the feature state its
      # dependency actually ends up unified to) went undetected.
      - name: Check --no-default-features (workspace matrix gap, #1472)
        run: cargo check --workspace --no-default-features

      - name: Run Clippy (strict)
        run: |
          cargo clippy --workspace --all-targets --features persistence,gpu,update-check \
            --exclude velesdb-python --exclude velesdb-node \
            -- -D warnings -D clippy::pedantic

      # velesdb-node is a cdylib: `--all-targets` would build a test harness that
      # links N-API symbols and fail (same reason velesdb-python is excluded
      # above). Lint just its library target, which links cleanly. The crate's
      # [lints] table already enables clippy::pedantic with the workspace allows.
      - name: Run Clippy (velesdb-node cdylib)
        run: cargo clippy -p velesdb-node --lib -- -D warnings

      - name: Run Clippy undocumented unsafe blocks (core)
        run: |
          cargo clippy -p velesdb-core --lib --bins \
            --features persistence,gpu,update-check \
            -- -A warnings -D clippy::undocumented_unsafe_blocks

      - name: Verify SAFETY template (production code)
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          # F-3.12: validate SAFETY templates in EVERY production crate, not
          # just velesdb-core. Bindings (velesdb-python, velesdb-wasm,
          # velesdb-mobile, tauri-plugin-velesdb) contain unsafe blocks too and
          # were previously unchecked, which let one incomplete template slip
          # through (F-3.2).
          mapfile -t PROD_RS_FILES < <(
            git diff --name-only "$BASE_SHA" "${{ github.sha }}" \
              | grep '\.rs$' \
              | grep -E '^crates/[^/]+/src/' \
              | grep -v '/tests/' \
              | grep -v '/benches/' \
              | grep -Ev '_tests?\.rs$'
          )
          if [[ ${#PROD_RS_FILES[@]} -eq 0 ]]; then
            echo "No changed production Rust files to validate."
            exit 0
          fi
          python3 scripts/verify_unsafe_safety_template.py --files "${PROD_RS_FILES[@]}" --strict

      - name: Check TODO/FIXME/HACK governance (production code)
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          mapfile -t CORE_RS_FILES < <(
            git diff --name-only "$BASE_SHA" "${{ github.sha }}" \
              | grep '\.rs$' \
              | grep '^crates/velesdb-core/src/' \
              | grep -v '/tests/' \
              | grep -v '/benches/' \
              | grep -Ev '_tests?\.rs$'
          )
          if [[ ${#CORE_RS_FILES[@]} -eq 0 ]]; then
            echo "No changed production Rust files to validate."
            exit 0
          fi
          python3 scripts/check-todo-annotations.py --files "${CORE_RS_FILES[@]}"

      - name: Check for .unwrap() in production code
        run: python3 scripts/check_prod_unwraps.py

      # REL-07 ran only at release time (release.yml), so a version drift in a
      # policed manifest was invisible until tagging. Running the same checker
      # at PR time surfaces the drift in the PR that introduces it (<5s, pure
      # python, no build needed).
      - name: Verify version sync across policed manifests (REL-07, PR-time)
        run: python3 scripts/check-version-sync.py

      - name: Test feature-claims audit script
        run: python3 -m unittest scripts.tests.test_check_feature_claims

      - name: Test prod-unwraps audit script
        run: python3 -m unittest scripts.tests.test_check_prod_unwraps

      - name: Audit feature claims vs exports
        run: python3 scripts/check-feature-claims.py

      - name: Audit performance claims consistency
        run: python3 scripts/check-perf-claims.py --no-criterion

      - name: Check doctests compile
        run: |
          cargo test --doc --package velesdb-core
        continue-on-error: false  # EPIC-080: Doctests fixes completed

  # ===========================================================================
  # Tests unitaires (parallèle avec lint et security)
  # TODO(S1-05): Add Windows and macOS test matrix for cross-platform coverage
  # ===========================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Free ~35 GB of disk space by dropping pre-installed tooling we do
      # not use (Android SDK, .NET, Haskell/GHC, cached Docker images).
      # Without this the full test matrix link phase runs out of space —
      # `ld` dies with SIGBUS when it cannot mmap more pages. Observed on
      # PR #633 (two consecutive runs, warning: "Free space left: 80 MB").
      #
      # Flag rationale:
      # * `tool-cache: false` — keeps rustup + the toolchain restored by
      #   `Swatinem/rust-cache`.
      # * `large-packages: false` — intentionally OFF. The action's
      #   `large-packages` flag runs `apt-get autoremove -y` which
      #   cascade-removes `libgl1-mesa-dri` and its reverse-dependencies,
      #   including `glib-2.0-dev` / `gtk-3-dev` that `glib-sys` / Tauri
      #   transitive deps need. Pulling those back in via
      #   `awalsh128/cache-apt-pkgs-action` below is unreliable once
      #   autoremove has touched them, so we simply keep them installed.
      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-ci"
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Run tests
        run: |
          cargo test --workspace --features persistence,gpu,update-check \
            --exclude velesdb-python --exclude velesdb-node \
            -- --test-threads=1
        env:
          RUST_TEST_THREADS: 1

      # Real-stdio MCP end-to-end (6 tools + text/media retrieve round-trip).
      # The debug binary is already built by the workspace test compile above;
      # cargo build is a cache no-op that guarantees it exists.
      - name: MCP server e2e (stdio)
        run: |
          cargo build -p velesdb-memory
          python3 crates/velesdb-memory/examples/context_savings/real_measures/mcp_e2e.py

  # ===========================================================================
  # Security Audit (parallèle - outils pré-compilés)
  # ===========================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run security audit (advisories, licenses, bans, sources)
        run: cargo deny check advisories licenses bans sources

  # ===========================================================================
  # NOTE: Miri & Loom moved to quality-deep.yml (weekly + manual)
  # This saves ~10-15 min of CI time per push
  # Run manually: Actions → Quality Deep → Run workflow
  # ===========================================================================

  # ===========================================================================
  # WASM Build Check (compile check + wasm-bindgen test suites)
  # NOTE: compat-matrix.yml also checks WASM; this job provides a dedicated
  # signal visible in the ci-success summary.
  # ===========================================================================
  wasm-check:
    name: WASM Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-ci-wasm"
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Install wasm32 target (belt-and-suspenders)
        run: rustup target add wasm32-unknown-unknown

      - name: Check WASM build (no default features)
        run: cargo check -p velesdb-wasm --no-default-features --target wasm32-unknown-unknown

      # The wasm-bindgen suites (tests/*.rs gated on target_arch = "wasm32",
      # e.g. memory_wedge_web.rs's JS-marshalling regression tests) compile
      # to empty binaries under the native test job and are invisible to the
      # cargo check above — without this step they never run in CI at all.
      - name: Install wasm-pack
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: wasm-pack

      - name: Run wasm-bindgen tests (Node)
        run: wasm-pack test --node crates/velesdb-wasm

  # ===========================================================================
  # OpenAPI Drift Check
  # Regenerates the committed docs/openapi.{json,yaml} snapshots from the
  # utoipa-derived schema and fails if they differ from what is checked in,
  # so the spec can never silently drift from the code.
  # ===========================================================================
  openapi-drift:
    name: OpenAPI Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-ci-openapi"
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Regenerate OpenAPI snapshots
        run: cargo test -p velesdb-server --features openapi generate_openapi_spec_files -- --test-threads=1

      - name: Check OpenAPI snapshots are up to date
        run: git diff --exit-code docs/openapi.json docs/openapi.yaml

  # ===========================================================================
  # Bench-sift1m Compile Check
  # Compiles (does NOT run) the SIFT1M bench and its unit tests with
  # `--features bench-sift1m` so API drift vs HnswIndex is caught on every
  # push instead of surfacing the next time someone tries to run the bench.
  # No dataset download, no benchmark execution, no test execution.
  # ===========================================================================
  bench-sift1m-compile:
    name: Bench SIFT1M Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-ci"
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: cargo check (bench + feature)
        run: cargo check -p velesdb-core --benches --features bench-sift1m

      - name: cargo check (sift1m loader unit tests)
        run: cargo check --tests -p velesdb-core --features bench-sift1m --test sift1m_loader_unit_tests

  # ===========================================================================
  # Python Integration Tests (uniquement si integrations/ modifié)
  # ===========================================================================
  python-integrations:
    name: Python Integrations
    runs-on: ubuntu-latest
    needs: test
    # Runs on PRs too (and gates CI Success) so connector regressions are
    # caught before merge — the LangChain suite once rotted to 21 failures
    # while this job was push-only and advisory.
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Cargo registry cache only (NOT the velesdb-python/target directory;
      # half-compiled pyo3 build artefacts from previous CI hotfix attempts
      # were causing pyo3-build-config to misdetect the interpreter even when
      # PYO3_PYTHON was set correctly).
      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-integ-py-cargo-${{ hashFiles('Cargo.lock') }}

      # Build velesdb-python from source via PEP 517 (pip invokes maturin
      # through pyproject.toml's `build-backend = "maturin"`). pip activates
      # the running Python interpreter as the build target automatically,
      # which is the only path that has worked end-to-end for pyo3 in this
      # workflow (raw `maturin build` and `PyO3/maturin-action` both fail
      # with "abi3-py3* feature must be specified", even with PYO3_PYTHON
      # set explicitly — see hotfix log #649-#655).
      - name: Build & install velesdb-python from source
        run: |
          # PEP 517 default build (debug profile). MATURIN_PEP517_ARGS=--release
          # was rejected because the flag was forwarded to ALL maturin
          # subcommands including `pep517 write-dist-info` which does not
          # accept it. Debug build is acceptable for the integration test
          # suite; test datasets are small enough that performance overhead
          # is not measurable on the bench.
          pip install --upgrade pip maturin
          pip install ./crates/velesdb-python --force-reinstall

      - name: Install velesdb-common (local shared package)
        run: pip install -e integrations/common

      # All three RAG framework connectors are installed and tested from
      # source. Until 2026-06 only LlamaIndex ran here — the LangChain
      # suite was never executed in CI and rotted to 21 failures.
      - name: Install & Test LangChain integration
        run: |
          pip install -e "integrations/langchain[dev]"
          python -m pytest integrations/langchain/tests/ -v --tb=short

      - name: Install & Test LlamaIndex integration
        run: |
          pip install -e "integrations/llamaindex[dev]"
          python -m pytest integrations/llamaindex/tests/ -v --tb=short

      - name: Install & Test Haystack integration
        run: |
          pip install -e "integrations/haystack[dev]"
          python -m pytest integrations/haystack/tests/ -v --tb=short

  # ===========================================================================
  # Python SDK Tests — velesdb-python (PyO3) binding functional suite.
  #
  # Until this job existed, crates/velesdb-python/tests/ was never run in CI:
  # the python-integrations job above exercises the three connector packages (LangChain / LlamaIndex / Haystack).
  # Runs on PRs too (no push-only gate) so binding regressions are caught
  # before merge. The slow recall gate (test_recall_gate.py, -m slow) is
  # excluded here — recall@10 >= 0.95 is enforced on a release wheel by
  # perf-gate-e2e.yml; a debug build is sufficient for the functional suite.
  # ===========================================================================
  python-sdk-tests:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-pysdk-cargo-${{ hashFiles('Cargo.lock') }}

      # PEP 517 source build (debug profile), identical to python-integrations.
      # numpy is a hard runtime dependency of the binding's NumPy fast paths.
      - name: Build & install velesdb-python from source
        run: |
          pip install --upgrade pip maturin numpy pytest
          pip install ./crates/velesdb-python --force-reinstall

      - name: Run velesdb-python functional tests
        working-directory: crates/velesdb-python
        run: python -m pytest tests/ -m "not slow" -p no:cacheprovider -q -W ignore::DeprecationWarning

  # Builds the napi addon and runs its Node test suite on PRs (gates CI Success)
  # so binding regressions are caught before merge. velesdb-node is a cdylib
  # excluded from `cargo test --workspace`, so this is its ONLY functional gate.
  node-binding-tests:
    name: Node Binding Tests
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-node-cargo-${{ hashFiles('Cargo.lock') }}

      - name: License/dependency boundary gate
        run: |
          # The addon must bind velesdb-memory ONLY (memory semantics), never the
          # raw engine, and must not pull the MCP server stack into the prebuild.
          if cargo tree -p velesdb-node --depth 1 -e normal | grep -qE 'velesdb-core v'; then
            echo "::error::velesdb-node has a DIRECT velesdb-core dependency (license boundary)"; exit 1
          fi
          for banned in 'rmcp v' 'velesdb-server v'; do
            if cargo tree -p velesdb-node -e normal | grep -qE "$banned"; then
              echo "::error::velesdb-node resolves '$banned' (must stay out of the lean addon)"; exit 1
            fi
          done
          echo "✅ dependency/license boundary holds"

      # Debug profile (dev = panic=unwind) is sufficient for the functional suite;
      # the release prebuild uses the [profile.release-node] panic=unwind override.
      - name: Build napi addon + run Node tests
        working-directory: crates/velesdb-node
        run: |
          npm install --no-audit --no-fund
          npx napi build --platform
          node --test __test__/index.spec.mjs

      # EPIC-P-071/A1 non-regression gate: "the facts survive compilation".
      # Reuses the napi addon just built above (no second Rust build) — this
      # job is the cheapest place to run it: the "Tests" job never sets up
      # Node or builds the addon, so branching there would pay for a full
      # extra napi build for one offline, network-free JS test file.
      # gpt-tokenizer is installed here (not committed) per
      # examples/real-session-benchmark/README.md's prereqs.
      - name: Real-session benchmark — facts-survive gate (offline, no network)
        run: |
          npm install --no-save --no-audit --no-fund --prefix crates/velesdb-node gpt-tokenizer
          node --test examples/real-session-benchmark/test/facts-survive.test.mjs

  # ===========================================================================
  # Coverage (main seulement)
  # ===========================================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    # Bound the job so a lost/hung runner fails fast (and can be re-run) instead
    # of hanging toward the 6h default — the full single-threaded suite under
    # llvm-cov + gpu features runs well within this.
    timeout-minutes: 45
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: llvm-tools-preview

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-ci"

      # Prebuilt binary (with built-in download retries) instead of
      # `cargo install` from source — faster and avoids the compile/network
      # flakes that lost the runner mid-job on earlier release runs.
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage report and enforce threshold
        run: |
          # Run tests with coverage instrumentation and emit lcov report.
          # Threshold is 78%: closer to the 80% project target, with a small
          # margin for variance. The gpu/update-check features add code paths that
          # are not exercisable in CI (no GPU hardware), lowering measured coverage
          # vs the local 82.30% badge which was measured without those features.
          cargo llvm-cov --features persistence,gpu,update-check --workspace \
            --exclude velesdb-python --exclude velesdb-node \
            --fail-under-lines 78 \
            --lcov --output-path lcov.info \
            -- --test-threads=1

      # Codecov upload disabled — no CODECOV_TOKEN configured.
      # Coverage is reported via Codacy (see below).
      # To re-enable: add CODECOV_TOKEN to repository secrets and uncomment.
      # - uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
      #   with:
      #     files: lcov.info
      #     token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        continue-on-error: true
        with:
          api-token: ${{ secrets.CODACY_API_TOKEN }}
          coverage-reports: lcov.info
        env:
          CODACY_ORGANIZATION_PROVIDER: gh
          CODACY_USERNAME: cyberlife-coder
          CODACY_PROJECT_NAME: VelesDB

      - name: Upload lcov for SonarCloud
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lcov-report
          path: lcov.info
          retention-days: 1

  # ===========================================================================
  # VelesQL Conformance (cross-ecosystem contract checks)
  # ===========================================================================
  velesql-conformance:
    name: VelesQL Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sdks/typescript/package-lock.json

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-ci"

      - name: Core parser conformance
        run: cargo test -p velesdb-core --test velesql_parser_conformance

      - name: CLI parser conformance
        run: cargo test -p velesdb-cli --test velesql_parser_conformance

      - name: WASM parser conformance
        run: cargo test -p velesdb-wasm --test velesql_parser_conformance

      - name: Core executor conformance
        run: cargo test -p velesdb-core --features persistence --test velesql_executor_conformance

      - name: CLI executor conformance
        run: cargo test -p velesdb-cli --test velesql_executor_conformance

      - name: WASM executor conformance
        run: cargo test -p velesdb-wasm velesql_executor_conformance

      - name: Server REST conformance
        run: cargo test -p velesdb-server --test velesql_conformance_tests

      - name: TypeScript SDK conformance
        working-directory: sdks/typescript
        run: |
          npm ci
          npm test -- velesql-contract-fixtures.test.ts

  # ===========================================================================
  # Performance Smoke Test (EPIC-026/US-002)
  # Blocking regression detection against baseline
  # ===========================================================================
  perf-smoke:
    name: Perf Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-ci"

      - name: Run smoke benchmark
        run: |
          cargo bench -p velesdb-core --bench smoke_test -- --noplot

      - name: Export smoke benchmark results
        run: |
          python3 scripts/export_smoke_criterion.py

      - name: Compare with baseline
        run: |
          python3 scripts/compare_perf.py \
            --current benchmarks/results/latest.json \
            --baseline benchmarks/baseline.json \
            --threshold 15

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf-smoke-results
          path: target/criterion/
          retention-days: 7

  # ===========================================================================
  # Benchmarks (main seulement - rapides uniquement)
  # ===========================================================================
  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable # Intentionally unpinned - uses toolchain input
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-ci"

      - name: Run fast benchmarks only
        run: |
          cargo bench -p velesdb-core \
            --bench simd_benchmark \
            --bench filter_benchmark \
            -- --noplot

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 7

  # ===========================================================================
  # SonarCloud Analysis (quality gate for main/develop)
  # ===========================================================================
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [lint, test, security, coverage]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lcov-report
        continue-on-error: true

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v3.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ===========================================================================
  # Summary (léger)
  # ===========================================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, test, security, wasm-check, openapi-drift, velesql-conformance, perf-smoke, bench-sift1m-compile, python-sdk-tests, python-integrations, node-binding-tests, sonarcloud]
    if: always()
    steps:
      # sonarcloud is intentionally absent from the gate below: it is an
      # external service (skipped on forks / token-less runs) and must not
      # block merges. It stays in `needs` so its status is visible here.
      - name: Check results
        run: |
          [[ "${{ needs.lint.result }}" == "success" ]] && \
          [[ "${{ needs.test.result }}" == "success" ]] && \
          [[ "${{ needs.wasm-check.result }}" == "success" ]] && \
          [[ "${{ needs.openapi-drift.result }}" == "success" ]] && \
          [[ "${{ needs.velesql-conformance.result }}" == "success" ]] && \
          [[ "${{ needs.perf-smoke.result }}" == "success" ]] && \
          [[ "${{ needs.bench-sift1m-compile.result }}" == "success" ]] && \
          [[ "${{ needs.python-sdk-tests.result }}" == "success" ]] && \
          [[ "${{ needs.python-integrations.result }}" == "success" ]] && \
          [[ "${{ needs.node-binding-tests.result }}" == "success" ]] && \
          [[ "${{ needs.security.result }}" == "success" ]] && \
          echo "✅ CI passed" || { echo "❌ CI failed"; exit 1; }
