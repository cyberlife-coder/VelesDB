name: Compatibility Matrix

on:
  push:
    branches: [main, develop]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/config.toml'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/config.toml'
      - '.github/workflows/**'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-matrix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux all features
            os: ubuntu-latest
            command: cargo check --workspace --all-targets --all-features --exclude velesdb-python
          # velesdb-wasm is wasm32-only; it is checked in the wasm-no-default job below.
          - name: Linux no default features
            os: ubuntu-latest
            command: cargo check -p velesdb-core --no-default-features
          - name: Windows all features
            os: windows-latest
            command: cargo check --workspace --all-targets --all-features --exclude velesdb-python

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@5513791f75b039e2a79653b1a92238d3fb8d99b4 # v1.6.2
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-compat-${{ matrix.os }}"

      - name: Run compatibility check
        shell: bash
        run: ${{ matrix.command }}

  wasm-no-default:
    name: WASM no default features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-compat-wasm"

      - name: Check velesdb-core and velesdb-wasm on wasm32 no-default-features
        run: cargo check -p velesdb-core -p velesdb-wasm --target wasm32-unknown-unknown --no-default-features

  loom-check:
    # This is a compile check (no test run), so it's deterministic — no
    # flake risk to weigh against making the gate required. Loom is also
    # how we catch concurrency-model drift between the `loom` and non-loom
    # builds; silencing this gate would let breakage land for free.
    name: Loom check (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # nightly
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-compat-loom"

      - name: Check loom feature build
        env:
          RUSTFLAGS: "--cfg loom"
        run: cargo +nightly check -p velesdb-core --features loom,persistence
