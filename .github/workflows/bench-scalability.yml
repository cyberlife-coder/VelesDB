# =============================================================================
# VelesDB Core - 100K Scalability Quick Benchmark
# =============================================================================
# Lightweight scalability check (100K vectors, 128-d) that runs:
#   - Weekly (Monday 06:00 UTC)
#   - On every push to main
#   - On manual dispatch
#
# Detects insert throughput and search latency regressions at moderate scale
# without the multi-hour cost of the full scalability_benchmark.
# =============================================================================

name: Scalability Benchmark

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: bench-scalability-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUST_VERSION: "1.90"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  scalability:
    name: 100K Scalability Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "velesdb-bench"

      - name: Run 100K scalability benchmark
        run: cargo bench -p velesdb-core --bench scalability_quick --features internal-bench -- --noplot

      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scalability-results
          path: target/criterion/
          retention-days: 30
