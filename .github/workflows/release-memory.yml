# Independent release pipeline for the `velesdb-memory` crate.
#
# velesdb-memory is versioned on its own 0.x cadence (decoupled from the
# workspace 3.x line), so it does NOT ride the workspace `vX.Y.Z` tag handled by
# release.yml. It ships on its own tag instead:
#
#     velesdb-memory-vX.Y.Z          (e.g. velesdb-memory-v0.1.0)
#     velesdb-memory-vX.Y.Z-<pre>    (prerelease; crates.io publish skipped)
#
# The tag version must match `crates/velesdb-memory/Cargo.toml` exactly. The
# crate depends on velesdb-core ^3.3.0, which is already on crates.io, so the
# package is dry-run validated up front (unlike workspace dependents, which
# cannot be dry-run before core is published).
#
# This pipeline also builds and attaches per-platform "daemon archives"
# (build-daemon-archive / publish-daemon-archive below): the .mcpb bundles
# published separately by release-mcpb.yml are built with DEFAULT features
# (stdio only — no `http`/`ollama`), so they can't run as the shared
# multi-client daemon scripts/install-memory-daemon.{sh,ps1} set up. The
# daemon archives are the SAME crate built with `--features ollama,http`
# instead, letting `--from-release` / `-FromRelease` in those install
# scripts install a working daemon binary with no Rust toolchain on the
# target machine.
name: Release velesdb-memory

on:
  push:
    tags:
      - 'velesdb-memory-v[0-9]+.[0-9]+.[0-9]+'
      - 'velesdb-memory-v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'velesdb-memory version to release (e.g. 0.1.0)'
        required: true
        type: string
      publish_crate:
        description: 'Publish to crates.io'
        type: boolean
        default: true
      publish_npm:
        description: 'Publish @wiscale/velesdb-memory-node to npm'
        type: boolean
        default: true
      publish_daemon_archive:
        description: 'Build and attach the --features ollama,http daemon archives to the GitHub Release'
        type: boolean
        default: true

concurrency:
  group: release-memory-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  checks: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_VERSION: '1.90'

jobs:
  # ===========================================================================
  # 1. Validate the tag against the crate's own version + packaging
  # ===========================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "release-memory"

      - name: Extract version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            # Tag form: refs/tags/velesdb-memory-vX.Y.Z[-pre]
            VERSION=${GITHUB_REF#refs/tags/velesdb-memory-v}
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          [[ "$VERSION" == *"-"* ]] && echo "is_prerelease=true" >> "$GITHUB_OUTPUT" || echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Verify tag matches crate version
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          CRATE_VERSION=$(python - <<'PY'
          import tomllib
          with open('crates/velesdb-memory/Cargo.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['package']['version'])
          PY
          )
          if [ "$CRATE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match crates/velesdb-memory/Cargo.toml ($CRATE_VERSION). Bump the crate version and re-tag."
            exit 1
          fi
          echo "✅ velesdb-memory version: $CRATE_VERSION"

      - name: Verify CI passed on tagged commit (REL-06)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          echo "Checking CI status for commit $SHA..."
          RESULT=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs?per_page=100" --paginate \
            --jq '[.check_runs[] | select(.name == "CI Success")] | first')
          if [ -z "$RESULT" ] || [ "$RESULT" = "null" ]; then
            echo "::error::No CI workflow found for commit $SHA. Push to main/develop first to trigger CI, then tag."
            exit 1
          fi
          STATUS=$(echo "$RESULT" | jq -r '.status // empty')
          CONCLUSION=$(echo "$RESULT" | jq -r '.conclusion // empty')
          if [ "$STATUS" != "completed" ]; then
            echo "::error::CI is still running ($STATUS) on commit $SHA. Wait for CI to complete before tagging."
            exit 1
          fi
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::CI failed ($CONCLUSION) on commit $SHA. Fix CI before releasing."
            exit 1
          fi
          echo "✅ CI passed on commit $SHA"

      - name: Validate packaging (dry-run)
        run: |
          # velesdb-core ^3.3.0 is already on crates.io, so the dependent
          # velesdb-memory can be fully dry-run packaged here.
          echo "📦 Dry-run packaging velesdb-memory..."
          cargo publish --dry-run --locked -p velesdb-memory
          echo "✅ velesdb-memory packaging validated"

  # ===========================================================================
  # 2. Publish to crates.io
  # ===========================================================================
  publish-crate:
    name: Publish crates.io
    runs-on: ubuntu-latest
    needs: validate
    if: |
      needs.validate.outputs.is_prerelease == 'false' &&
      (github.event_name == 'push' || inputs.publish_crate)
    environment: crates-io
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "release-memory"

      - name: Publish velesdb-memory
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          echo "📦 Publishing velesdb-memory..."
          for attempt in 1 2 3; do
            if cargo publish --locked -p velesdb-memory; then
              echo "✅ Published velesdb-memory"
              exit 0
            fi
            echo "⚠️ Publish failed (attempt $attempt/3), retrying in 15s..."
            sleep 15
          done
          echo "❌ Failed to publish velesdb-memory after 3 attempts"
          exit 1

      - name: Verify crates.io version
        run: |
          chmod +x scripts/check-crates-io-versions.sh
          scripts/check-crates-io-versions.sh "${{ needs.validate.outputs.version }}" velesdb-memory

  # ===========================================================================
  # 3. Build the native Node addon for every supported target
  # ===========================================================================
  #
  # @wiscale/velesdb-memory-node is a napi-rs addon: a thin per-platform `.node`
  # binary plus a pure-JS loader. We cross-build all five targets declared in
  # crates/velesdb-node/package.json `napi.targets`, upload each as an artifact,
  # then the publish-npm job assembles them into the per-platform npm packages.
  #
  # The npm package version is decoupled from the crate but rides the SAME
  # velesdb-memory-vX.Y.Z tag (one release event for the whole memory product),
  # so the first build step fails loudly if package.json drifts from the tag.
  build-node:
    name: Build node (${{ matrix.target }})
    needs: validate
    if: |
      needs.validate.outputs.is_prerelease == 'false' &&
      (github.event_name == 'push' || inputs.publish_npm)
    strategy:
      fail-fast: false
      matrix:
        # HARDENING (tracked, not yet enabled): no *-unknown-linux-musl target, so
        # Alpine / musl Node users (the default `node` Docker base) get no prebuilt
        # binary and `require` fails. Add `x86_64-unknown-linux-musl` (and arm64
        # musl) here + in package.json `napi.targets` + the root optionalDependencies.
        # Deferred because a misconfigured musl leg would block this whole job
        # (publish-npm `needs` every build leg green) — enable with a CI dry-run.
        include:
          - target: aarch64-apple-darwin
            host: macos-latest
          - target: x86_64-apple-darwin
            host: macos-latest
          - target: x86_64-unknown-linux-gnu
            host: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            host: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            host: windows-latest
    runs-on: ${{ matrix.host }}
    defaults:
      run:
        working-directory: crates/velesdb-node
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}
      # Belt-and-braces: rust-toolchain.toml pins the same version as
      # `RUST_VERSION`, so the dtolnay step above already added the cross
      # target's std to the toolchain cargo actually uses. This step targets
      # the *active* toolchain (whatever rust-toolchain.toml resolves to), so
      # cross targets (aarch64-linux-gnu, x86_64-apple-darwin) find core/std
      # instead of failing with E0463 even if the two pins ever drift again.
      - name: Add cross target std to the active toolchain
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "release-memory-node-${{ matrix.target }}"
          workspaces: ". -> target"

      - name: Verify package.json version matches tag
        shell: bash
        env:
          TAG_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::crates/velesdb-node/package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION). Bump it alongside the crate and re-tag."
            exit 1
          fi
          echo "✅ node package version: $PKG_VERSION"

      - name: Install build deps (@napi-rs/cli)
        run: npm install

      - name: Build addon
        # napi reads the profile from package.json's build script; pass the
        # target explicitly for cross/host builds. --use-napi-cross supplies the
        # zig-based sysroot for the one cross target (no Docker needed).
        run: npx napi build --platform --profile release-node --target ${{ matrix.target }} ${{ matrix.cross && '--use-napi-cross' || '' }}

      - name: Smoke-test the addon (native targets only)
        # HARDENING (tracked): this skips x86_64-apple-darwin (Rosetta on the arm
        # runner) and the aarch64 cross target, so two binaries publish without a
        # load test. To close: run the smoke test under an emulator (QEMU for arm64,
        # or a native x86 mac runner) so every shipped .node is load-verified.
        if: ${{ !matrix.cross && matrix.target != 'x86_64-apple-darwin' }}
        # An explicit spec file, deliberately: a bare `node --test __test__/`
        # directory argument stops being recursively discovered on recent Node
        # majors, and `npm test`'s `__test__/*.spec.mjs` glob is not expanded
        # by the Windows shell on Node 20 ("Could not find '...\*.spec.mjs'" —
        # this exact step failed on x86_64-pc-windows-msvc for the 0.10.0 tag
        # and skipped the npm publish). This step's only job is proving the
        # freshly built .node addon loads on this platform; index.spec.mjs is
        # exactly that. The full suite (including skills-sync) runs in CI via
        # `npm test`.
        run: node --test __test__/index.spec.mjs

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bindings-${{ matrix.target }}
          path: crates/velesdb-node/*.node
          if-no-files-found: error

  # ===========================================================================
  # 4. Assemble per-platform packages and publish to npm
  # ===========================================================================
  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: [validate, build-node]
    if: |
      needs.validate.outputs.is_prerelease == 'false' &&
      (github.event_name == 'push' || inputs.publish_npm)
    environment: npm
    permissions:
      contents: read
      id-token: write # required by `npm publish --provenance`
    defaults:
      run:
        working-directory: crates/velesdb-node
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install deps
        run: npm install

      - name: Download all addon artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: crates/velesdb-node/artifacts
          pattern: bindings-*
          merge-multiple: true

      - name: Stage native binaries into per-platform npm dirs
        # Each per-platform package is published separately, so it must carry the
        # VelesDB Core License text itself — `create-npm-dirs` does not copy it.
        # npm always includes a top-level LICENSE file regardless of `files`, so
        # dropping it (and the README) into each dir is enough.
        run: |
          npx napi create-npm-dirs
          npx napi artifacts --output-dir ./artifacts
          for d in npm/*/; do cp LICENSE README.md "$d"; done
          ls -R ./npm

      - name: Publish to npm
        # `prepublishOnly` (napi prepublish -t npm) publishes the per-platform
        # @wiscale/velesdb-memory-node-<triple> packages and injects them as
        # optionalDependencies before the root package is published here. The
        # already-published guard below mirrors release.yml so a re-run is idempotent
        # for the ROOT package.
        #
        # HARDENING (tracked): the per-platform sub-packages are published by
        # prepublishOnly with NO skip-if-exists guard. If a run dies after some
        # sub-packages publish but before the root, a re-run hits "cannot overwrite
        # version" on the published sub-packages and cannot cleanly recover. To close:
        # change prepublishOnly to `napi prepublish -t npm --skip-optional-publish`
        # (napi >=3.7 keeps the optionalDependencies injection, only skips the publish)
        # and publish each `npm/*/` here in an explicit loop with the same
        # publish-or-skip-if-already-on-npm guard used for the root. Verify with a
        # `--dry-run` first.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          if npm publish --access public --provenance; then
            echo "✅ published @wiscale/velesdb-memory-node@$VERSION"
          elif npm view "@wiscale/velesdb-memory-node@$VERSION" version >/dev/null 2>&1; then
            echo "⏭️ @wiscale/velesdb-memory-node@$VERSION already on npm — skipping"
          else
            echo "❌ npm publish FAILED for @wiscale/velesdb-memory-node@$VERSION (auth/registry error, NOT already-published)"
            exit 1
          fi

  # ===========================================================================
  # 5. Build the daemon binary for each platform (--features ollama,http)
  # ===========================================================================
  #
  # Same crate/bin as the default-feature .mcpb bundles in release-mcpb.yml,
  # built with the daemon's actual feature set instead. `ollama` stays a
  # compile-time opt-in only because the runtime VELESDB_MEMORY_EMBEDDER=ollama
  # switch needs the code present to select at all — the embedder choice
  # itself is still a pure runtime decision either way (see build_daemon /
  # Build-Daemon in the install scripts, which always request both features
  # regardless of which embedder the user picks).
  build-daemon-archive:
    name: Build daemon archive (${{ matrix.target }})
    needs: validate
    if: github.event_name == 'push' || inputs.publish_daemon_archive
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-apple-darwin,      host: macos-latest,   archive: tar.gz }
          - { target: x86_64-apple-darwin,       host: macos-latest,   archive: tar.gz }
          - { target: x86_64-unknown-linux-gnu,  host: ubuntu-latest,  archive: tar.gz }
          - { target: aarch64-unknown-linux-gnu, host: ubuntu-latest,  archive: tar.gz, cross: true }
          - { target: x86_64-pc-windows-msvc,    host: windows-latest, archive: zip }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      # rust-toolchain.toml pins the build to its own toolchain, which rustup
      # auto-installs WITHOUT the cross-compilation target added above (the
      # action only adds it to `stable`) — same fix as release-mcpb.yml's
      # equivalent step, needed for the same reason (E0463 otherwise).
      - name: Add target to the pinned toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Install aarch64 linux cross linker
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "release-memory-daemon-${{ matrix.target }}"

      - name: Build velesdb-memory (--features ollama,http)
        run: cargo build --release --locked -p velesdb-memory --bin velesdb-memory --target ${{ matrix.target }} --features ollama,http

      - name: Package archive + checksum
        shell: bash
        run: |
          set -euo pipefail
          STAGE="daemon-stage"
          rm -rf "$STAGE" && mkdir -p "$STAGE"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            EXE="velesdb-memory.exe"
            cp "target/${{ matrix.target }}/release/${EXE}" "$STAGE/${EXE}"
            ASSET="velesdb-memory-daemon-${{ matrix.target }}.zip"
            # Portable zip (no `zip` binary on Windows runners) — same
            # technique as release-mcpb.yml's bundle step.
            python3 - "$STAGE" "$ASSET" <<'PYZIP'
          import os, sys, zipfile
          stage, asset = sys.argv[1], sys.argv[2]
          with zipfile.ZipFile(asset, "w", zipfile.ZIP_DEFLATED) as z:
              for root, _, files in os.walk(stage):
                  for f in files:
                      full = os.path.join(root, f)
                      arc = os.path.relpath(full, stage).replace(os.sep, "/")
                      z.write(full, arc)
          print("zipped", asset)
          PYZIP
          else
            EXE="velesdb-memory"
            cp "target/${{ matrix.target }}/release/${EXE}" "$STAGE/${EXE}"
            chmod +x "$STAGE/${EXE}"
            ASSET="velesdb-memory-daemon-${{ matrix.target }}.tar.gz"
            tar -C "$STAGE" -czf "$ASSET" "${EXE}"
          fi

          # sha256sum isn't guaranteed on every runner (macOS ships `shasum`
          # instead) — python3's hashlib is on all three, so use that for one
          # consistent "<hex>  <filename>" line the install scripts can parse
          # the same way on every platform.
          python3 -c "
          import hashlib, sys
          h = hashlib.sha256()
          with open(sys.argv[1], 'rb') as f:
              for chunk in iter(lambda: f.read(1 << 20), b''):
                  h.update(chunk)
          print(f'{h.hexdigest()}  {sys.argv[1]}')
          " "$ASSET" > "${ASSET}.sha256"

          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"
          echo "Built ${ASSET} ($(cat "${ASSET}.sha256"))"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: daemon-archive-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          if-no-files-found: error

  # ===========================================================================
  # 6. Attach the daemon archives to the GitHub Release
  # ===========================================================================
  #
  # release-mcpb.yml separately creates/updates the SAME velesdb-memory-vX.Y.Z
  # release for its .mcpb bundles, triggered by the same tag push — so this
  # job's "create if missing, `|| true` on the race" is not optional
  # defensiveness, it is load-bearing: both workflows can hit `gh release
  # create` for the same tag within moments of each other. Whichever loses
  # that race gets a harmless "already exists" failure (swallowed by
  # `|| true`) and both proceed straight to `gh release upload`, which is
  # idempotent per file (`--clobber`).
  publish-daemon-archive:
    name: Attach daemon archives to release
    needs: [validate, build-daemon-archive]
    if: github.event_name == 'push' || inputs.publish_daemon_archive
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all daemon archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: daemon-archives
          pattern: daemon-archive-*
          merge-multiple: true

      - name: Attach archives to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: velesdb-memory-v${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          # --latest=false: same reasoning as release-mcpb.yml — the
          # velesdb-memory release must never become the repo's "Latest
          # release" (that belongs to the workspace vX.Y.Z release).
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --latest=false --notes "velesdb-memory $TAG — daemon archives (--features ollama,http) for install-memory-daemon.sh/.ps1 --from-release." || true
          fi
          ls -la daemon-archives/
          gh release upload "$TAG" daemon-archives/* --clobber
