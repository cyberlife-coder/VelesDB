version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "rust"]
    open-pull-requests-limit: 5
    target-branch: "develop"
    groups:
      # Batch all non-major cargo bumps into one PR per week so the
      # backlog stays manageable. Major bumps stay one-per-PR because
      # they need targeted review (API changes, MSRV drift, etc.).
      cargo-non-major:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      security-cargo:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/sdks/typescript"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "javascript"]
    open-pull-requests-limit: 3
    target-branch: "develop"
    groups:
      npm-sdk-non-major:
        applies-to: version-updates
        update-types: ["minor", "patch"]
      security-npm-sdk:
        applies-to: security-updates
        patterns: ["*"]

  # Example/demo npm packages (examples/*, demos/*) are intentionally NOT tracked:
  # they ship nothing, so keeping their deps current has ~zero value, and ci.yml is
  # path-filtered to skip examples/** — so their bumps can never satisfy the required
  # "CI Success" check and pile up as unmergeable PRs. The shipped SDK
  # (/sdks/typescript) and the product python wheel ARE tracked, above/below.
  - package-ecosystem: "pip"
    directory: "/crates/velesdb-python"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "python"]
    open-pull-requests-limit: 3
    target-branch: "develop"
    groups:
      pip-non-major:
        applies-to: version-updates
        update-types: ["minor", "patch"]
      security-pip:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker"]
    open-pull-requests-limit: 3
    target-branch: "develop"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["ci", "dependencies"]
    open-pull-requests-limit: 3
    target-branch: "develop"
    ignore:
      # cache-apt-pkgs-action v1.6.2 added `empty_packages_behavior: error`, which
      # fails (exit 3) on an apt cache-HIT — every job that caches glib/gtk/webkit
      # hits this once the shared cache is warm, breaking Lint/Tests/Bench. It's a
      # CI-speed action with no value to us in v1.6.2+, and adapting all ~15 call
      # sites isn't worth the ROI. Pin v1.6.1; revisit if a later release fixes the
      # cache-hit regression. (Security updates still flow via the security-gha group.)
      - dependency-name: "awalsh128/cache-apt-pkgs-action"
        versions: [">=1.6.2"]
    groups:
      gha-non-major:
        applies-to: version-updates
        update-types: ["minor", "patch"]
      security-gha:
        applies-to: security-updates
        patterns: ["*"]
